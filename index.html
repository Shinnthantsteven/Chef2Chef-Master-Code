<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chef2Chef | Master Code Engine</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png">

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand: #10b981;
            --brand-deep: #059669;
            --bg-color: #020617;
            --card-bg: #0f172a;
            --text: #f1f5f9;
            --header-bg: #010409;
            --glass-edge: rgba(255, 255, 255, 0.15);
            --danger: #ef4444;
            --hl: #fbbf24;
            --input-bg: rgba(0,0,0,0.3);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --header-bg: #ffffff;
            --glass-edge: rgba(0, 0, 0, 0.15);
            --input-bg: rgba(255,255,255,0.4);
        }

        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-color); color: var(--text); 
            height: 100vh; overflow: hidden; 
            transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- PREMIUM REAL GLASS PORTAL BAR --- */
        .portal-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            max-width: 1150px;
            padding: 14px 22px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(30px) saturate(170%);
            -webkit-backdrop-filter: blur(30px) saturate(170%);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 
                0 25px 60px rgba(0,0,0,0.55),
                inset 0 1px 1px rgba(255,255,255,0.15),
                inset 0 -1px 1px rgba(0,0,0,0.4);
            z-index: 1000;
            transition: all 0.35s ease;
        }

        /* --- GLASS SEARCH INPUT --- */
        #searchIn {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 60px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            outline: none;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 
                inset 0 3px 8px rgba(0,0,0,0.55),
                inset 0 -2px 6px rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        #searchIn::placeholder { color: var(--text); opacity: 0.45; font-weight: 600; }
        #searchIn:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(16,185,129,0.25), inset 0 3px 8px rgba(0,0,0,0.55); }

        /* --- TABLE & UI STYLES --- */
        .logo-wrap {
            width: 42px; height: 42px;
            background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 2px solid var(--brand);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
            flex-shrink: 0; clip-path: circle(50% at 50% 50%);
        }

        .header-logo { width: 100%; height: 100%; object-fit: cover; }

        #sideMenu {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--card-bg); z-index: 3000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-right: 1px solid var(--glass-edge); padding: 40px 20px; box-sizing: border-box;
        }
        #sideMenu.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 2500; backdrop-filter: blur(8px); }
        
        .top-nav { 
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; 
            background: var(--header-bg); border-bottom: 1px solid var(--glass-edge);
            position: sticky; top: 0; z-index: 2000; backdrop-filter: blur(12px);
        }

        .content-container { flex: 1; overflow-y: auto; padding: 0 40px 180px 40px; height: calc(100vh - 80px); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { 
            position: sticky; top: 0; background: var(--bg-color); padding: 25px 15px; 
            text-align: left; font-size: 11px; color: #94a3b8; text-transform: uppercase; 
            z-index: 50; border-bottom: 2px solid var(--brand); letter-spacing: 1px;
        }

        /* Column Widths */
        th:nth-child(1) { width: 90px; } 
        th:nth-child(2) { width: 38%; } 
        th:nth-child(3) { width: 85px; } 
        th:nth-child(4) { width: 75px; } 
        th:nth-child(5) { width: 110px; } 
        th:nth-child(6) { width: 170px; } /* Room for Supplier */
        th:nth-child(7) { width: 180px; } 
        th:nth-child(8) { width: 80px; }  /* MPN Compact */

        td { padding: 18px 15px; border-bottom: 1px solid var(--glass-edge); font-size: 13px; cursor: pointer; vertical-align: middle; transition: background 0.2s; overflow: hidden; text-overflow: ellipsis; }
        
        .brand-pill { background: rgba(59,130,246,0.1); color: #60a5fa; padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 10px; display: inline-block; border: 1px solid rgba(59,130,246,0.2); }
        .origin-pill { background: rgba(16,185,129,0.1); color: var(--brand); padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 10px; margin-left: 4px; display: inline-block; border: 1px solid rgba(16,185,129,0.2); }
        .cat-pill { background: rgba(251,191,36,0.1); color: #fbbf24; padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 10px; margin-left: 4px; display: inline-block; border: 1px solid rgba(251,191,36,0.2); }
        .state-pill { background: rgba(167,139,250,0.1); color: #a78bfa; padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 10px; margin-left: 4px; display: inline-block; border: 1px solid rgba(167,139,250,0.2); }

        #loginScreen { position: fixed; inset: 0; background: var(--bg-color); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-card { background: rgba(128,128,128,0.05); padding: 50px; border-radius: 40px; border: 1px solid var(--glass-edge); text-align: center; width: 440px; backdrop-filter: blur(20px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--brand); color: white; padding: 10px 30px; border-radius: 50px; font-weight: 800; display: none; z-index: 9999; }
    </style>
</head>
<body onload="document.getElementById('passIn').focus()">

<div id="sideMenu">
    <h2 style="margin-left:15px; font-size:18px; letter-spacing:-0.5px;">SYSTEM MENU</h2>
    <div class="menu-item" onclick="toggleTheme(); toggleMenu();">🌓 Toggle Visual Theme</div>
    <div class="menu-item" onclick="location.reload()">🔄 Refresh Engine Data</div>
    <button onclick="toggleMenu()" style="width:100%; padding:15px; margin-top:30px; border-radius:12px; border:none; background:var(--danger); color:white; font-weight:800; cursor:pointer;">CLOSE MENU</button>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div id="loginScreen">
    <div id="knife" style="font-size:80px; margin-bottom:20px;">🔪</div>
    <div class="login-card">
        <h1>MASTER CODE ENGINE</h1>
        <p style="font-size: 11px; opacity: 0.5; font-weight: 700;">CHEF2CHEF SECURE ACCESS</p>
        <input type="password" id="passIn" placeholder="••••••••" onkeydown="if(event.key === 'Enter') checkAuth()" style="width: 100%; padding: 20px; border-radius: 20px; border: 1px solid var(--glass-edge); background: var(--input-bg); color: var(--text); font-weight: 600; text-align: center; margin-top: 20px;">
        <button class="unlock-btn" onclick="checkAuth()" style="width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--brand); color: white; font-weight: 800; margin-top: 20px; cursor: pointer;">INITIALIZE SYSTEM</button>
        <p id="err" style="color:var(--danger); font-size:11px; margin-top:15px; font-weight:700;"></p>
    </div>
</div>

<nav class="top-nav">
    <div style="display:flex; align-items:center; gap:20px;">
        <div onclick="toggleMenu()" style="font-size: 26px; cursor: pointer; color: var(--brand);">☰</div>
        <a href="https://chef2chef.ae" target="_blank" style="font-weight: 800; font-size: 20px; display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit;">
            <div class="logo-wrap"><img src="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png" class="header-logo" alt="Logo"></div>
            <span>CHEF2CHEF <span style="color:var(--brand)">MASTER</span></span>
        </a>
    </div>
</nav>

<div class="content-container">
    <table>
        <thead>
            <tr>
                <th>UID</th>
                <th>Item Description / Class</th>
                <th>Cost</th>
                <th>U/M</th>
                <th>Case Pack</th>
                <th>Supplier</th>
                <th>Brand/Origin/Cat</th>
                <th>MPN</th>
            </tr>
        </thead>
        <tbody id="list" onclick="handleQuickCopy(event)"></tbody>
    </table>
</div>

<div class="portal-bar">
    <input type="file" id="fileIn" style="display:none" onchange="manualUpload(event)">
    <button onclick="document.getElementById('fileIn').click()" style="background:none; border:none; cursor:pointer; font-size:24px; opacity:0.6;">📁</button>
    <input type="text" id="searchIn" placeholder="Filter through master records...">
    <button onclick="location.reload()" style="background:var(--danger); border:none; color:white; padding:12px 30px; border-radius:50px; font-weight:800; cursor:pointer;">EXIT</button>
</div>

<div id="toast">DATA COPIED</div>

<script>
/* CORE LOGIC PRESERVED */
let db = [];
let currentSearch = "";

function toggleMenu() {
    document.getElementById('sideMenu').classList.toggle('active');
    const overlay = document.getElementById('overlay');
    overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
}

function toggleTheme() {
    const doc = document.documentElement;
    const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    doc.setAttribute('data-theme', next);
}

function checkAuth() {
    if(document.getElementById('passIn').value === 'C2C2026') {
        document.getElementById('loginScreen').style.display = 'none';
        autoLoad();
    } else {
        document.getElementById('err').innerText = "ACCESS DENIED";
    }
}

async function autoLoad() {
    try {
        const res = await fetch('data.csv?v=' + Date.now());
        const text = await res.text();
        processData(text);
    } catch(e) { console.log("Load failed."); }
}

function manualUpload(e) {
    const reader = new FileReader();
    reader.onload = (event) => processData(event.target.result);
    reader.readAsText(e.target.files[0]);
}

function cleanString(str) { return String(str || "").replace(/[^\x20-\x7E]/g, '').trim(); }

function processData(csv) {
    const wb = XLSX.read(csv, { type: 'string' });
    const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
    db = raw.map(r => ({
        id: cleanString(r['Item']),
        desc: cleanString(r['Description']),
        cost: cleanString(r['Cost']).toLowerCase().replace(/aed/g, '').trim(),
        um: cleanString(r['Base U/M']).split(' (')[0],
        pack: cleanString(r['Case Packing'] || r['Case Pack']),
        cat: cleanString(r['Cat 2']),
        state: cleanString(r['State']),
        sup: cleanString(r['Preferred Supplier']),
        brand: cleanString(r['Brand']),
        origin: cleanString(r['Origin'] || "UAE"),
        manu: cleanString(r['Manu. Part No.'] || r['Manu. Par'])
    }));
    render(db);
}

function render(data) {
    const list = document.getElementById('list');
    list.innerHTML = data.slice(0, 100).map(r => `
        <tr>
            <td style="color:#64748b; font-family:monospace; font-weight:700;">${r.id}</td>
            <td><div style="font-weight:700;">${r.desc}</div></td>
            <td style="color:var(--brand); font-weight:800; font-size:16px;">${r.cost}</td>
            <td style="font-weight:700;">${r.um}</td>
            <td style="color:#818cf8; font-weight:700;">${r.pack}</td>
            <td style="color:#a78bfa; font-size:12px; font-weight:700;">${r.sup}</td>
            <td>
                <span class="brand-pill">${r.brand}</span>
                <span class="origin-pill">${r.origin}</span>
                <span class="cat-pill">${r.cat}</span>
                <span class="state-pill">${r.state}</span>
            </td>
            <td style="color:#64748b; font-size:11px;">${r.manu}</td>
        </tr>
    `).join('');
}

document.getElementById('searchIn').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = db.filter(r => Object.values(r).some(v => v.toLowerCase().includes(term)));
    render(filtered);
});

function handleQuickCopy(e) {
    const cell = e.target.closest('td');
    if (!cell) return;
    navigator.clipboard.writeText(cell.innerText).then(() => {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 600);
    });
}
</script>
</body>
</html>
