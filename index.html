<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Chef2Chef | Master Code Engine</title>

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>

:root{
--brand:#10b981;
--brand-deep:#059669;
--bg:#020617;
--card:#0f172a;
--text:#f1f5f9;
--glass:rgba(255,255,255,0.08);
--glass-edge:rgba(255,255,255,0.15);
--danger:#ef4444;
}

[data-theme="light"]{
--bg:#f8fafc;
--card:#ffffff;
--text:#0f172a;
--glass:rgba(0,0,0,0.04);
--glass-edge:rgba(0,0,0,0.15);
}

body,html{
margin:0;
font-family:'Plus Jakarta Sans',sans-serif;
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
}

/* HEADER */
.top-nav{
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:var(--card);
border-bottom:1px solid var(--glass-edge);
position:sticky;
top:0;
z-index:2000;
backdrop-filter:blur(14px);
}

/* SIDE MENU */
#sideMenu{
position:fixed;
left:-280px;
top:0;
width:280px;
height:100%;
background:var(--card);
transition:.4s cubic-bezier(.16,1,.3,1);
z-index:3000;
padding:40px 20px;
box-shadow:20px 0 50px rgba(0,0,0,.5);
}

#sideMenu.active{left:0;}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
z-index:2500;
backdrop-filter:blur(8px);
}

/* LOGIN */
#loginScreen{
position:fixed;
inset:0;
background:var(--bg);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:5000;
}

.login-card{
background:var(--glass);
padding:50px;
border-radius:40px;
border:1px solid var(--glass-edge);
width:420px;
text-align:center;
backdrop-filter:blur(25px);
box-shadow:0 25px 60px rgba(0,0,0,.5);
}

.login-card input{
width:100%;
padding:18px;
border-radius:20px;
border:1px solid var(--glass-edge);
background:rgba(0,0,0,.25);
color:var(--text);
font-size:20px;
text-align:center;
outline:none;
margin-top:20px;
}

/* BUBBLE SEARCH TUBE ⭐ */

.portal-bar{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);

width:88%;
max-width:1100px;

display:flex;
align-items:center;
gap:18px;

padding:10px 28px;

background:rgba(255,255,255,0.04);
border:2px solid var(--glass-edge);

border-radius:999px;

backdrop-filter:blur(22px);

box-shadow:
0 25px 50px rgba(0,0,0,.6),
inset 0 0 12px rgba(255,255,255,.03);
}

#searchIn{
flex:1;
background:transparent;
border:none;
outline:none;
font-size:17px;
font-weight:700;
color:var(--text);
}

#searchIn::placeholder{
opacity:.5;
}

/* TABLE */

.content-container{
flex:1;
overflow-y:auto;
padding:0 40px 180px;
height:calc(100vh - 80px);
}

table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}

th{
position:sticky;
top:0;
background:var(--bg);
padding:25px 15px;
font-size:11px;
text-transform:uppercase;
color:#94a3b8;
border-bottom:2px solid var(--brand);
letter-spacing:1px;
}

td{
padding:18px 15px;
border-bottom:1px solid var(--glass-edge);
font-size:13px;
vertical-align:middle;
cursor:pointer;
transition:.2s;
}

tr:hover td{
background:rgba(255,255,255,.02);
}

/* Pills */

.brand-pill{
background:rgba(59,130,246,.1);
color:#60a5fa;
padding:4px 10px;
border-radius:6px;
font-size:10px;
font-weight:700;
border:1px solid rgba(59,130,246,.2);
}

.origin-pill{
background:rgba(16,185,129,.1);
color:var(--brand);
padding:4px 10px;
border-radius:6px;
font-size:10px;
margin-left:4px;
border:1px solid rgba(16,185,129,.2);
}

/* MARK HIGHLIGHT */

mark{
background:#fbbf24;
color:#000;
padding:2px 4px;
border-radius:4px;
font-weight:800;
}

</style>
</head>

<body onload="document.getElementById('passIn').focus()">

<div id="loginScreen">
<div class="login-card">
<h1>MASTER CODE ENGINE</h1>

<p style="font-size:11px;opacity:.5">CHEF2CHEF SECURE ACCESS</p>

<input type="password"
id="passIn"
placeholder="••••••••"
onkeydown="if(event.key==='Enter') checkAuth()">

<button onclick="checkAuth()"
style="width:100%;padding:18px;border:none;
border-radius:20px;background:var(--brand);
color:white;font-weight:800;margin-top:20px;cursor:pointer;">
INITIALIZE SYSTEM
</button>

<p id="err" style="color:var(--danger);font-size:11px;margin-top:15px"></p>
</div>
</div>

<nav class="top-nav">
<div style="display:flex;align-items:center;gap:20px">
<div onclick="toggleMenu()" style="font-size:26px;cursor:pointer;color:var(--brand)">☰</div>

<div style="display:flex;align-items:center;gap:14px;font-weight:800">
<div style="width:42px;height:42px;border-radius:50%;overflow:hidden;border:2px solid var(--brand)">
<img src="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png"
style="width:100%;height:100%;object-fit:cover">
</div>

<span>CHEF2CHEF <span style="color:var(--brand)">MASTER</span></span>
</div>
</div>

<button onclick="toggleTheme()"
style="background:none;border:none;font-size:22px;cursor:pointer">
🌙
</button>
</nav>

<div class="content-container">
<table>
<thead>
<tr>
<th>UID</th>
<th>Description</th>
<th>Cost</th>
<th>U/M</th>
<th>Pack</th>
<th>Supplier</th>
<th>Brand/Origin</th>
<th>MPN</th>
</tr>
</thead>

<tbody id="list" onclick="handleQuickCopy(event)"></tbody>
</table>
</div>

<!-- BUBBLE SEARCH TUBE -->
<div class="portal-bar">
<input type="file" id="fileIn" hidden onchange="manualUpload(event)">

<button onclick="document.getElementById('fileIn').click()"
style="background:none;border:none;font-size:22px;cursor:pointer;opacity:.6">
📁
</button>

<input id="searchIn"
placeholder="Filter master records...">

<button onclick="location.reload()"
style="background:var(--danger);border:none;
color:white;padding:12px 30px;border-radius:999px;
font-weight:800;cursor:pointer">
EXIT
</button>
</div>

<script>

let db=[]
let currentSearch=""

function toggleMenu(){
document.getElementById('sideMenu').classList.toggle('active')
const overlay=document.getElementById('overlay')
overlay.style.display=overlay.style.display==='block'?'none':'block'
}

function toggleTheme(){
const doc=document.documentElement
const next=doc.getAttribute('data-theme')==='light'?'dark':'light'
doc.setAttribute('data-theme',next)
}

function checkAuth(){
if(document.getElementById('passIn').value==='C2C2026'){
document.getElementById('loginScreen').style.display='none'
autoLoad()
}else{
document.getElementById('err').innerText='ACCESS DENIED'
}
}

async function autoLoad(){
try{
const res=await fetch('data.csv?v='+Date.now())
const text=await res.text()
processData(text)
}catch{}
}

function manualUpload(e){
const reader=new FileReader()
reader.onload=e=>processData(e.target.result)
reader.readAsText(e.target.files[0])
}

function cleanString(str){
return String(str||"").replace(/[^\x20-\x7E]/g,'').trim()
}

function processData(csv){
try{
const wb=XLSX.read(csv,{type:'string'})
const raw=XLSX.utils.sheet_to_json(
wb.Sheets[wb.SheetNames[0]],
{defval:""}
)

db=raw.map(r=>({
id:cleanString(r['Item']),
desc:cleanString(r['Description']),
cost:cleanString(r['Cost']).replace(/aed/i,'').trim(),
um:cleanString(r['Base U/M']).split(' (')[0],
pack:cleanString(r['Case Packing']||r['Case Pack']),
cat:cleanString(r['Cat 2']),
sup:cleanString(r['Preferred Supplier']),
brand:cleanString(r['Brand']),
origin:cleanString(r['Origin']||"UAE"),
manu:cleanString(r['Manu. Part No.']||r['Manu. Par'])
}))

render(db)

}catch{}
}

function highlight(text){
if(!currentSearch||!text) return text

let out=text
currentSearch.split(/\s+/).forEach(word=>{
if(!word) return
const reg=new RegExp(`(${word.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\$&')})`,'gi')
out=out.replace(reg,'<mark>$1</mark>')
})

return out
}

document.getElementById('searchIn').addEventListener('input',e=>{
currentSearch=e.target.value.toLowerCase().trim()

const terms=currentSearch.split(/\s+/)

const filtered=db.filter(r=>{
const rowText=`${r.id} ${r.desc} ${r.pack} ${r.cat} ${r.sup} ${r.brand} ${r.manu}`.toLowerCase()
return terms.every(t=>rowText.includes(t))
})

render(filtered)
})

function render(data){
const list=document.getElementById('list')

list.innerHTML=data.slice(0,100).map(r=>`
<tr>
<td>${highlight(r.id)}</td>

<td>
<div style="font-weight:700">${highlight(r.desc)}</div>
<div style="font-size:10px;color:var(--brand);font-weight:800">
${highlight(r.cat)}
</div>
</td>

<td style="color:var(--brand);font-weight:800;font-size:16px">
${r.cost}
</td>

<td>${highlight(r.um)}</td>

<td style="color:#818cf8;font-weight:700">
${highlight(r.pack)}
</td>

<td style="font-size:12px;color:#a78bfa">
${highlight(r.sup)}
</td>

<td>
<span class="brand-pill">${highlight(r.brand)}</span>
<span class="origin-pill">${highlight(r.origin)}</span>
</td>

<td style="font-family:monospace;font-size:11px;color:#64748b">
${highlight(r.manu)}
</td>

</tr>
`).join('')
}

function handleQuickCopy(e){
const cell=e.target.closest('td')
if(!cell) return

navigator.clipboard.writeText(cell.innerText).then(()=>{
const toast=document.getElementById('toast')
if(toast){
toast.style.display='block'
setTimeout(()=>toast.style.display='none',600)
}
if(navigator.vibrate) navigator.vibrate(50)
})
}

</script>

</body>
</html>
