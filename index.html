<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chef2Chef | Master Code Engine</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png">

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- YOUR ENTIRE ORIGINAL CSS REMAINS EXACTLY THE SAME -->
    <!-- (CSS REMOVED HERE FOR BREVITY IN THIS VIEW — KEEP YOUR ORIGINAL CSS BLOCK EXACTLY AS IS) -->

</head>
<body onload="document.getElementById('passIn').focus()">

<!-- EVERYTHING ABOVE REMAINS EXACTLY AS YOU PROVIDED -->

<script>
let db = [];
let currentSearch = "";

function toggleMenu() {
    document.getElementById('sideMenu').classList.toggle('active');
    const overlay = document.getElementById('overlay');
    overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
}

function toggleTheme() {
    const doc = document.documentElement;
    const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    doc.setAttribute('data-theme', next);
    document.getElementById('navToggle').innerText = next === 'light' ? '☀️' : '🌙';
}

function checkAuth() {
    if(document.getElementById('passIn').value === 'C2C2026') {
        document.getElementById('knife').classList.add('knife-slice');
        setTimeout(() => {
            document.getElementById('loginScreen').style.display = 'none';
            autoLoad();
        }, 400);
    } else {
        document.getElementById('err').innerText = "INVALID ACCESS CODE";
    }
}

async function autoLoad() {
    try {
        const res = await fetch('data.csv?v=' + Date.now());
        const text = await res.text();
        processData(text);
    } catch(e) { console.log("Load failed."); }
}

function manualUpload(e) {
    const reader = new FileReader();
    reader.onload = (event) => processData(event.target.result);
    reader.readAsText(e.target.files[0]);
}

function cleanString(str) {
    return String(str || "").replace(/[^\x20-\x7E]/g, '').trim();
}

/* ========================= */
/* ONLY FIXED FUNCTION BELOW */
/* ========================= */
function processData(csv) {
    try {
        const wb = XLSX.read(csv, { type: 'string' });
        const sheet = wb.Sheets[wb.SheetNames[0]];

        // Read raw rows to safely trim headers
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

        // Trim header names (fixes "Item " issue permanently)
        const headers = rows[0].map(h => String(h).trim());

        const data = rows.slice(1).map(row => {
            let obj = {};
            headers.forEach((h, i) => {
                obj[h] = row[i];
            });
            return obj;
        });

        db = data.map(r => ({
            id: cleanString(r['Item']),
            desc: cleanString(r['Item Description']),
            stock: cleanString(r['QB System Stock QTY']),
            sup: cleanString(r['Preferred Supplier']),
            um: cleanString(r['U/M']),
            pack: cleanString(r['Case Pack']),
            brand: cleanString(r['Brand']),
            origin: cleanString(r['Origin']),
            cat: cleanString(r['Cat 2'])
        }));

        render(db);

    } catch(e) { 
        console.log("Processing error.", e); 
    }
}
/* ========================= */

function highlight(text) {
    if (!currentSearch || !text) return text;
    const terms = currentSearch.split(/\s+/).filter(w => w.length > 0);
    let highlighted = text;
    terms.forEach(word => {
        const reg = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        highlighted = highlighted.replace(reg, '<mark>$1</mark>');
    });
    return highlighted;
}

document.getElementById('searchIn').addEventListener('input', (e) => {
    currentSearch = e.target.value.toLowerCase().trim();
    const terms = currentSearch.split(/\s+/);
    const filtered = db.filter(r => {
        const rowText = `${r.id} ${r.desc} ${r.sup} ${r.brand} ${r.cat}`.toLowerCase();
        return terms.every(term => rowText.includes(term));
    });
    render(filtered);
});

function render(data) {
    const list = document.getElementById('list');
    list.innerHTML = data.slice(0, 100).map(r => {
        const stockVal = parseFloat(r.stock) || 0;
        const stockColor = stockVal < 0 ? 'var(--danger)' : 'var(--text)';
        
        return `
        <tr>
            <td style="color:var(--brand); font-weight:800; font-size:14px; font-family: monospace;">
                ${highlight(r.id)}
            </td>
            <td class="desc-cell">${highlight(r.desc)}</td>
            <td style="font-weight:900; font-style: italic; font-size: 16px; color: ${stockColor};">
                ${r.stock}
            </td>
            <td style="color:#a78bfa; font-size:13px; font-weight:700;">${highlight(r.sup)}</td>
            <td style="font-weight:700;">${highlight(r.um)}</td>
            <td style="color:#818cf8; font-weight:700;">${highlight(r.pack)}</td>
            <td><span class="brand-pill">${highlight(r.brand)}</span></td>
            <td><span class="origin-pill">${highlight(r.origin)}</span></td>
            <td style="color:var(--brand); font-weight:800; font-size:12px;">${highlight(r.cat)}</td>
        </tr>
    `}).join('');
}

function handleQuickCopy(e) {
    const cell = e.target.closest('td');
    if (!cell) return;
    navigator.clipboard.writeText(cell.innerText).then(() => {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        if (window.navigator.vibrate) window.navigator.vibrate(50);
        setTimeout(() => { toast.style.display = 'none'; }, 600);
    });
}
</script>

</body>
</html>
