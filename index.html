<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chef2Chef | Master Code Engine</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png">

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand: #10b981;
            --brand-deep: #059669;
            --bg-color: #020617;
            --card-bg: #0f172a;
            --text: #f1f5f9;
            --glass-edge: rgba(255,255,255,0.12);
            --danger: #ef4444;
            --hl: #fbbf24;
        }

        [data-theme="light"] {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text: #0f172a;
            --glass-edge: rgba(0,0,0,0.10);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-color); color: var(--text);
            height: 100vh; overflow: hidden;
            transition: background 0.3s;
        }

        /* ── SIDE MENU ── */
        #sideMenu {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--card-bg); z-index: 3000;
            transition: 0.4s cubic-bezier(0.16,1,0.3,1);
            border-right: 1px solid var(--glass-edge);
            padding: 40px 20px;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        #sideMenu.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 2500; backdrop-filter: blur(8px); }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 12px; background: rgba(255,255,255,0.05); font-weight: 700; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .menu-item:hover { background: rgba(255,255,255,0.08); border-color: var(--brand); }
        .menu-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin: 20px 0 10px 15px; font-weight: 800; }

        /* ── LOGIN ── */
        #loginScreen {
            position: fixed; inset: 0; background: var(--bg-color);
            z-index: 5000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .knife-box { font-size: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 25px var(--brand)); transition: 0.5s cubic-bezier(0.4,0,0.2,1); }
        .knife-slice { transform: scale(15) translateX(100px) rotate(45deg); opacity: 0; }
        .login-card {
            background: rgba(128,128,128,0.05); padding: 50px; border-radius: 40px;
            border: 1px solid var(--glass-edge); text-align: center; width: 440px;
            backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .login-card h1 { font-size: 24px; margin-bottom: 8px; font-weight: 800; }
        .login-card input {
            width: 100%; padding: 20px; border-radius: 20px;
            border: 1px solid var(--glass-edge); background: rgba(0,0,0,0.3);
            color: var(--text); font-weight: 600; font-size: 20px; outline: none;
            text-align: center; margin-top: 20px; transition: 0.3s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .login-card input:focus { border-color: var(--brand); box-shadow: 0 0 15px rgba(16,185,129,0.2); }
        .unlock-btn { width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--brand); color: white; font-weight: 800; cursor: pointer; margin-top: 20px; transition: 0.3s; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; }
        .unlock-btn:hover { background: var(--brand-deep); transform: translateY(-1px); }

        /* ── GLASS NAV ── */
        .top-nav {
            padding: 12px 32px;
            display: flex; justify-content: space-between; align-items: center;
            background: transparent;
            border-bottom: 1.5px solid rgba(255,255,255,0.18);
            position: sticky; top: 0; z-index: 2000;
        }
        [data-theme="light"] .top-nav { border-bottom-color: rgba(0,0,0,0.1); }

        .menu-btn { font-size: 24px; cursor: pointer; color: var(--brand); }
        .logo-wrap {
            width: 38px; height: 38px; background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 2px solid var(--brand);
            box-shadow: 0 0 12px rgba(16,185,129,0.4); flex-shrink: 0;
        }
        .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text { font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; letter-spacing: -0.5px; }
        .nav-sys-tag { font-size: 10px; font-weight: 800; letter-spacing: 0.5px; color: #64748b; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-edge); border-radius: 50px; padding: 5px 14px; }

        /* ── TABLE ── */
        .content-container {
            overflow-y: auto; padding: 0 32px 180px 32px; height: calc(100vh - 70px);
            mask-image: linear-gradient(to bottom, black 78%, rgba(0,0,0,0.15) 93%, rgba(0,0,0,0.08) 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 78%, rgba(0,0,0,0.15) 93%, rgba(0,0,0,0.08) 100%);
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }

        thead tr th {
            position: sticky; top: 8px;
            background: #0d1829;
            padding: 16px 12px;
            text-align: left; font-size: 10px;
            color: #94a3b8; text-transform: uppercase;
            z-index: 50; letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            border-left: none; border-right: none;
        }
        [data-theme="light"] thead tr th {
            background: #334155;
            color: #e2e8f0;
            border-top-color: rgba(255,255,255,0.15);
            border-bottom-color: rgba(255,255,255,0.15);
        }
        thead tr th:first-child {
            border-radius: 20px 0 0 20px;
            border-left: 1px solid rgba(255,255,255,0.08);
            padding-left: 22px;
        }
        thead tr th:last-child {
            border-radius: 0 20px 20px 0;
            border-right: 1px solid rgba(255,255,255,0.08);
            padding-right: 22px;
        }

        th:nth-child(1) { width: 75px; }
        th:nth-child(2) { width: 38%; }
        th:nth-child(3) { width: 60px; }
        th:nth-child(4) { width: 45px; }
        th:nth-child(5) { width: 90px; }
        th:nth-child(6) { width: 13%; }
        th:nth-child(7) { width: 130px; }
        th:nth-child(8) { width: 40px; }

        td { padding: 14px 12px; border-bottom: 1px solid var(--glass-edge); font-size: 13px; cursor: pointer; vertical-align: middle; transition: background 0.15s; overflow: hidden; text-overflow: ellipsis; }
        tr:hover td { background: rgba(255,255,255,0.025); }

        .desc-name { font-weight: 700; font-size: 15px; line-height: 1.4; margin-bottom: 5px; }
        .pack-cell { display: flex; flex-direction: column; gap: 5px; align-items: flex-start; }
        .pack-value { color: #818cf8; font-weight: 700; }
        .sup-cell { color: #e2e8f0; font-size: 12px; font-weight: 700; white-space: normal; line-height: 1.4; }
        [data-theme="light"] .sup-cell { color: #1e293b; }

        .cat-pill    { background: rgba(251,191,36,0.12);  color: #fbbf24; padding: 3px 9px; border-radius: 20px; font-weight: 800; font-size: 10px; display: inline-block; border: 1px solid rgba(251,191,36,0.3); }
        .state-pill  { background: rgba(6,182,212,0.12);   color: #22d3ee; padding: 3px 9px; border-radius: 20px; font-weight: 800; font-size: 10px; display: inline-block; border: 1px solid rgba(6,182,212,0.3); }
        .brand-pill  { background: rgba(59,130,246,0.10);  color: #60a5fa; padding: 3px 9px; border-radius: 20px; font-weight: 800; font-size: 10px; display: inline-block; border: 1px solid rgba(59,130,246,0.25); }
        .origin-pill { background: rgba(16,185,129,0.10);  color: #10b981; padding: 3px 9px; border-radius: 20px; font-weight: 800; font-size: 10px; display: inline-block; border: 1px solid rgba(16,185,129,0.25); }

        mark { background: var(--hl); color: #000; border-radius: 4px; padding: 2px 4px; font-weight: 800; box-shadow: 0 0 12px rgba(251,191,36,0.6); }

        /* ══ PURE GLASS SEARCH BAR ══ */
        .portal-bar {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            width: 82%; max-width: 1060px;
            border-radius: 100px;
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.28);
            box-shadow: none;
            display: flex; align-items: center; position: relative;
            z-index: 1000;
            transition: border-color 0.3s;
        }

        /* ✨ Shiny bubble line across top edge */
        .portal-bar::before {
            content: '';
            position: absolute;
            top: -1.5px; left: 12%; right: 12%; height: 3px;
            background: linear-gradient(90deg,
                transparent,
                rgba(255,255,255,0.9) 40%,
                rgba(255,255,255,1.0) 50%,
                rgba(255,255,255,0.9) 60%,
                transparent);
            border-radius: 999px;
            pointer-events: none; z-index: 10;
        }

        .portal-bar:focus-within { border-color: rgba(16,185,129,0.6); }
        .portal-bar:focus-within::before {
            background: linear-gradient(90deg,
                transparent,
                rgba(16,185,129,0.8) 40%,
                rgba(16,185,129,1.0) 50%,
                rgba(16,185,129,0.8) 60%,
                transparent);
        }

        [data-theme="light"] .portal-bar { border-color: rgba(0,0,0,0.2); }

        .bar-upload-btn {
            display: flex; align-items: center; justify-content: center;
            width: 56px; height: 56px; flex-shrink: 0;
            background: none; border: none;
            border-right: 1px solid rgba(255,255,255,0.15);
            cursor: pointer; font-size: 20px; opacity: 0.6;
            transition: opacity 0.2s;
        }
        .bar-upload-btn:hover { opacity: 1; }

        .bar-search-wrap { flex: 1; display: flex; align-items: center; gap: 10px; padding: 0 18px; }
        .bar-search-icon { font-size: 15px; opacity: 0.5; flex-shrink: 0; }

        #searchIn {
            background: transparent; border: none; color: var(--text);
            font-size: 15px; font-weight: 700; outline: none; flex: 1;
            padding: 18px 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        #searchIn::placeholder { color: var(--text); opacity: 0.4; font-weight: 600; }

        .bar-count {
            font-size: 11px; font-weight: 800; color: var(--brand);
            background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.35);
            border-radius: 50px; padding: 4px 12px;
            white-space: nowrap; flex-shrink: 0; letter-spacing: 0.3px;
        }

        .bar-exit-btn {
            background: var(--danger); border: none; color: white;
            padding: 0 28px; height: 56px;
            border-radius: 0 100px 100px 0;
            font-weight: 800; font-size: 13px; cursor: pointer;
            flex-shrink: 0; letter-spacing: 0.5px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.2s;
            box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset;
        }
        .bar-exit-btn:hover { background: #dc2626; }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 170px; left: 50%; transform: translateX(-50%);
            background: rgba(16,185,129,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16,185,129,0.35);
            color: var(--brand); padding: 10px 28px; border-radius: 50px;
            font-weight: 800; font-size: 13px;
            display: none; z-index: 9999;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body onload="document.getElementById('passIn').focus()">

<!-- SIDE MENU -->
<div id="sideMenu">
    <h2 style="margin-left:15px;font-size:18px;letter-spacing:-0.5px;">SYSTEM MENU</h2>
    <div class="menu-label">Preferences</div>
    <div class="menu-item" onclick="toggleTheme();toggleMenu()">🌓 Toggle Visual Theme</div>
    <div class="menu-item" onclick="location.reload()">🔄 Refresh Engine Data</div>
    <button onclick="toggleMenu()" style="width:100%;padding:15px;margin-top:30px;border-radius:12px;border:none;background:var(--danger);color:white;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;">CLOSE MENU</button>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- LOGIN -->
<div id="loginScreen">
    <div id="knife" class="knife-box">🔪</div>
    <div class="login-card">
        <h1>MASTER CODE ENGINE</h1>
        <p style="font-size:11px;opacity:0.5;font-weight:700;">CHEF2CHEF SECURE ACCESS</p>
        <input type="password" id="passIn" placeholder="••••••••" onkeydown="if(event.key==='Enter') checkAuth()">
        <button class="unlock-btn" onclick="checkAuth()">INITIALIZE SYSTEM</button>
        <p id="err" style="color:var(--danger);font-size:11px;margin-top:15px;font-weight:700;"></p>
    </div>
</div>

<div id="toast">✓ DATA COPIED</div>

<!-- GLASS NAV -->
<nav class="top-nav">
    <div style="display:flex;align-items:center;gap:18px;">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <a href="https://chef2chef.ae" target="_blank" class="logo-text">
            <div class="logo-wrap">
                <img src="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png" alt="Logo">
            </div>
            <span>CHEF2CHEF <span style="color:var(--brand)">MASTER</span></span>
        </a>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
        <div class="nav-sys-tag">SYS_ROOT: STEVE</div>
        <button onclick="toggleTheme()" id="navToggle" style="background:rgba(255,255,255,0.05);border:1px solid var(--glass-edge);border-radius:50px;padding:7px 14px;cursor:pointer;font-size:18px;transition:0.2s;">🌙</button>
    </div>
</nav>

<!-- TABLE -->
<div class="content-container">
    <table>
        <thead>
            <tr>
                <th>UID</th>
                <th>Item Description</th>
                <th>Cost</th>
                <th>U/M</th>
                <th>Case Pack</th>
                <th>Supplier</th>
                <th>Brand / Origin</th>
                <th>MPN</th>
            </tr>
        </thead>
        <tbody id="list" onclick="handleQuickCopy(event)"></tbody>
    </table>
</div>

<!-- GLASS SEARCH BAR -->
<div class="portal-bar">
    <input type="file" id="fileIn" style="display:none" onchange="manualUpload(event)">
    <button class="bar-upload-btn" onclick="document.getElementById('fileIn').click()" title="Upload CSV">📁</button>
    <div class="bar-search-wrap">
        <span class="bar-search-icon">🔍</span>
        <input type="text" id="searchIn" placeholder="Search items, suppliers, categories…">
        <span class="bar-count" id="resultCount"></span>
    </div>
    <button class="bar-exit-btn" onclick="location.reload()">EXIT</button>
</div>

<script>
let db = [];
let currentSearch = "";
let totalLoaded = 0;

function toggleMenu() {
    document.getElementById('sideMenu').classList.toggle('active');
    const o = document.getElementById('overlay');
    o.style.display = o.style.display === 'block' ? 'none' : 'block';
}

function toggleTheme() {
    const doc = document.documentElement;
    const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    doc.setAttribute('data-theme', next);
    document.getElementById('navToggle').innerText = next === 'light' ? '☀️' : '🌙';
}

function checkAuth() {
    if (document.getElementById('passIn').value === 'C2C2026') {
        document.getElementById('knife').classList.add('knife-slice');
        setTimeout(() => {
            document.getElementById('loginScreen').style.display = 'none';
            autoLoad();
        }, 400);
    } else {
        document.getElementById('err').innerText = "ACCESS DENIED: INCORRECT CODE";
    }
}

async function autoLoad() {
    try {
        const res = await fetch('data.csv?v=' + Date.now());
        const text = await res.text();
        processData(text);
    } catch(e) { console.log("Auto-load failed. Manual upload required."); }
}

function manualUpload(e) {
    const reader = new FileReader();
    reader.onload = (event) => processData(event.target.result);
    reader.readAsText(e.target.files[0]);
}

function cleanString(str) {
    return String(str || "").replace(/[^\x20-\x7E]/g, '').trim();
}

function processData(csv) {
    try {
        const wb = XLSX.read(csv, { type: 'string' });
        const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
        db = raw.map(r => ({
            id:     cleanString(r['Item']),
            desc:   cleanString(r['Description']),
            cost:   cleanString(r['Cost']).toLowerCase().replace(/aed/g,'').trim(),
            um:     cleanString(r['Base U/M']).split(' (')[0],
            pack:   cleanString(r['Case Packing'] || r['Case Pack']),
            cat:    cleanString(r['Cat 2']),
            state:  cleanString(r['State']),
            sup:    cleanString(r['Preferred Supplier']),
            brand:  cleanString(r['Brand']),
            origin: cleanString(r['Origin'] || "UAE"),
            manu:   cleanString(r['Manu. Part No.'] || r['Manu. Par'])
        }));
        totalLoaded = db.length;
        render(db);
        updateCount(db.length);
    } catch(e) { console.log("Data processing error."); }
}

function updateCount(n) {
    const el = document.getElementById('resultCount');
    if (totalLoaded > 0) {
        el.textContent = currentSearch ? `${n} / ${totalLoaded}` : `${n} items`;
    }
}

function highlight(text) {
    if (!currentSearch || !text) return text;
    const terms = currentSearch.split(/\s+/).filter(w => w.length > 0);
    let h = text;
    terms.forEach(word => {
        const reg = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
        h = h.replace(reg, '<mark>$1</mark>');
    });
    return h;
}

document.getElementById('searchIn').addEventListener('input', e => {
    currentSearch = e.target.value.toLowerCase().trim();
    const terms = currentSearch.split(/\s+/);
    const filtered = currentSearch
        ? db.filter(r => {
            const t = `${r.id} ${r.desc} ${r.pack} ${r.cat} ${r.state} ${r.sup} ${r.brand} ${r.manu}`.toLowerCase();
            return terms.every(term => t.includes(term));
          })
        : db;
    render(filtered);
    updateCount(filtered.length);
});

function render(data) {
    document.getElementById('list').innerHTML = data.slice(0, 100).map(r => `
        <tr>
            <td style="color:#64748b;font-family:monospace;font-weight:700;font-size:11px;">${highlight(r.id)}</td>
            <td>
                <div class="desc-name">${highlight(r.desc)}</div>
                ${r.cat ? `<span class="cat-pill">${highlight(r.cat)}</span>` : ''}
            </td>
            <td style="color:var(--brand);font-weight:800;font-size:15px;">${r.cost}</td>
            <td style="font-weight:700;">${highlight(r.um)}</td>
            <td>
                <div class="pack-cell">
                    <span class="pack-value">${highlight(r.pack)}</span>
                    ${r.state ? `<span class="state-pill">${highlight(r.state)}</span>` : ''}
                </div>
            </td>
            <td class="sup-cell">${highlight(r.sup)}</td>
            <td>
                <span class="brand-pill">${highlight(r.brand)}</span>
                <span class="origin-pill">${highlight(r.origin)}</span>
            </td>
            <td style="color:#64748b;font-size:11px;font-family:monospace;">${highlight(r.manu)}</td>
        </tr>
    `).join('');
}

function handleQuickCopy(e) {
    const cell = e.target.closest('td');
    if (!cell) return;
    navigator.clipboard.writeText(cell.innerText).then(() => {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        if (navigator.vibrate) navigator.vibrate(50);
        setTimeout(() => { t.style.display = 'none'; }, 700);
    });
}
</script>
</body>
</html>
