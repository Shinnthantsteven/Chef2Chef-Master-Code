<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chef2Chef | Master Code</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#30d158">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg:#161618; --bg2:#1c1c1e; --surface:#2c2c2e; --surface2:#3a3a3c;
            --sep:rgba(255,255,255,0.08); --text:#f5f5f7; --text2:#98989d; --text3:#636366;
            --accent:#0a84ff; --brand:#30d158; --brand-deep:#25a244;
            --red:#ff453a; --yellow:#ffd60a; --hl:#ffd60a;
            --glass:rgba(22,22,24,0.82);
            --input-bg:rgba(255,255,255,0.06);
            --shadow:0 8px 32px rgba(0,0,0,0.5);
        }
        [data-theme="light"] {
            --bg:#f5f5f7; --bg2:#ffffff; --surface:#ffffff; --surface2:#f2f2f7;
            --sep:rgba(0,0,0,0.08); --text:#1d1d1f; --text2:#6e6e73; --text3:#aeaeb2;
            --glass:rgba(245,245,247,0.88);
            --input-bg:rgba(0,0,0,0.04);
            --shadow:0 8px 32px rgba(0,0,0,0.12);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body,html{
            font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
            background:var(--bg);color:var(--text);height:100vh;overflow:hidden;
            transition:background .3s,color .3s;-webkit-font-smoothing:antialiased;
        }
        mark{background:rgba(255,214,10,.2);color:#ffd60a;border-radius:3px;padding:1px 3px;font-weight:600}

        /* ─── SIDEBAR ─── */
        #sideMenu{
            position:fixed;left:-300px;top:0;width:300px;height:100%;
            background:var(--bg2);z-index:3000;
            transition:left .35s cubic-bezier(.4,0,.2,1);
            border-right:1px solid var(--sep);
            padding:60px 14px 24px;
            box-shadow:var(--shadow);
        }
        #sideMenu.active{left:0}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:2500;backdrop-filter:blur(6px)}
        .menu-section-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;padding:8px 12px;margin-top:16px}
        .menu-item{
            display:flex;align-items:center;gap:12px;padding:10px 12px;
            border-radius:10px;font-size:14px;font-weight:500;color:var(--text);
            cursor:pointer;transition:background .15s;border:none;width:100%;
            background:transparent;font-family:inherit;text-align:left;
        }
        .menu-item:hover{background:var(--surface2)}
        .menu-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
        .menu-close{
            width:100%;padding:12px;margin-top:20px;border-radius:10px;
            border:none;background:var(--red);color:#fff;font-weight:600;
            font-size:14px;cursor:pointer;font-family:inherit;transition:opacity .2s;
        }
        .menu-close:hover{opacity:.85}

        /* ─── NAV BAR ─── */
        .top-nav{
            height:52px;padding:0 20px;
            display:flex;justify-content:space-between;align-items:center;
            background:var(--glass);
            backdrop-filter:blur(24px) saturate(180%);
            -webkit-backdrop-filter:blur(24px) saturate(180%);
            border-bottom:1px solid var(--sep);
            position:sticky;top:0;z-index:2000;
        }
        .nav-left{display:flex;align-items:center;gap:10px}
        .traffic-lights{display:flex;gap:6px;align-items:center;margin-right:4px}
        .tl{width:12px;height:12px;border-radius:50%;cursor:pointer;transition:filter .2s}
        .tl:hover{filter:brightness(1.2)}
        .tl-red{background:#ff5f57}
        .tl-yellow{background:#febc2e}
        .tl-green{background:#28c840}
        .menu-btn{font-size:18px;cursor:pointer;color:var(--text2);padding:6px;border-radius:6px;transition:color .2s;user-select:none}
        .menu-btn:hover{color:var(--text)}
        .logo-wrap{width:26px;height:26px;border-radius:7px;overflow:hidden;flex-shrink:0}
        .header-logo{width:100%;height:100%;object-fit:cover}
        .logo-text{font-size:14px;font-weight:600;letter-spacing:-.3px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px}
        .logo-accent{color:var(--brand)}
        .nav-right{display:flex;align-items:center;gap:10px}
        .nav-tag{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;padding:4px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--sep)}
        .theme-btn{
            width:32px;height:32px;border-radius:8px;border:1px solid var(--sep);
            background:var(--input-bg);color:var(--text);cursor:pointer;
            font-size:15px;display:flex;align-items:center;justify-content:center;
            transition:background .2s;font-family:inherit;
        }
        .theme-btn:hover{background:var(--surface2)}

        /* ─── LOGIN ─── */
        #loginScreen{
            position:fixed;inset:0;background:var(--bg);z-index:5000;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
        }
        .knife-box{font-size:64px;margin-bottom:28px;transition:.5s cubic-bezier(.4,0,.2,1)}
        .knife-slice{transform:scale(12) translateX(100px) rotate(45deg);opacity:0}
        .login-logo{width:72px;height:72px;border-radius:18px;overflow:hidden;margin-bottom:24px;box-shadow:var(--shadow)}
        .login-logo img{width:100%;height:100%;object-fit:cover}
        .login-card{
            background:var(--surface);padding:40px 44px;border-radius:20px;
            border:1px solid var(--sep);text-align:center;width:380px;
            box-shadow:var(--shadow);
        }
        .login-title{font-size:20px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px}
        .login-sub{font-size:13px;color:var(--text2);margin-bottom:24px;font-weight:400}
        .login-input{
            width:100%;padding:12px 16px;border-radius:10px;
            border:1.5px solid var(--sep);background:var(--input-bg);
            color:var(--text);font-size:18px;outline:none;text-align:center;
            font-family:inherit;transition:border-color .2s;
            margin-bottom:12px;letter-spacing:.3em;
        }
        .login-input:focus{border-color:var(--accent)}
        .login-btn{
            width:100%;padding:13px;border-radius:10px;border:none;
            background:var(--accent);color:#fff;font-weight:600;font-size:15px;
            cursor:pointer;font-family:inherit;transition:opacity .2s;
        }
        .login-btn:hover{opacity:.9}
        #err{color:var(--red);font-size:12px;margin-top:12px;min-height:18px;font-weight:500}

        /* ─── TABLE ─── */
        .content-container{
            flex:1;overflow-y:auto;padding:0 24px 200px;
            height:calc(100vh - 52px);
        }
        table{width:100%;border-collapse:collapse;table-layout:fixed}
        thead tr th{
            position:sticky;top:0;
            background:var(--glass);
            backdrop-filter:blur(24px);
            -webkit-backdrop-filter:blur(24px);
            padding:13px 12px;text-align:left;
            font-size:11px;color:var(--text2);font-weight:600;
            text-transform:uppercase;letter-spacing:.06em;
            border-bottom:1px solid var(--sep);z-index:50;
        }
        th:nth-child(1){width:95px} th:nth-child(2){width:30%} th:nth-child(3){width:80px}
        th:nth-child(4){width:50px} th:nth-child(5){width:105px} th:nth-child(6){width:110px}
        th:nth-child(7){width:14%} th:nth-child(8){width:120px}
        td{
            padding:10px 12px;border-bottom:1px solid var(--sep);
            font-size:13px;cursor:pointer;vertical-align:middle;
            transition:background .12s;overflow:hidden;text-overflow:ellipsis;
        }
        tr:hover td{background:var(--surface)}
        td:first-child,th:first-child{padding-left:20px}
        .desc-cell-inner{display:flex;align-items:center;gap:12px}
        .desc-text-wrap{flex:1;min-width:0}
        .desc-name{font-weight:600;font-size:13px;line-height:1.4;margin-bottom:4px;letter-spacing:-.1px}
        .desc-pills{display:flex;gap:4px;flex-wrap:wrap}

        /* ─── PRODUCT PHOTO ─── */
        .prod-photo-wrap{
            width:48px;height:48px;flex-shrink:0;border-radius:10px;
            overflow:hidden;border:1px solid var(--sep);position:relative;cursor:zoom-in;
        }
        .prod-photo-bg{position:absolute;inset:0;border-radius:10px}
        .prod-photo-emoji{
            position:absolute;inset:0;display:flex;align-items:center;
            justify-content:center;font-size:20px;z-index:1;
            filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));transition:opacity .4s;
        }
        .prod-photo-img{
            position:absolute;inset:0;width:100%;height:100%;
            object-fit:cover;opacity:0;transition:opacity .5s;z-index:2;border-radius:10px;
        }
        .prod-photo-img.visible{opacity:1}
        .photo-spinner{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:3}
        .photo-spinner svg{animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .photo-live-dot{
            position:absolute;top:4px;right:4px;width:6px;height:6px;
            border-radius:50%;background:var(--brand);z-index:4;display:none;
            animation:livepulse 1.2s ease-in-out infinite;
        }
        @keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}

        /* ─── PILLS ─── */
        .cat-pill{background:rgba(255,214,10,.12);color:#ffd60a;padding:2px 8px;border-radius:20px;font-weight:600;font-size:10px;display:inline-block;border:1px solid rgba(255,214,10,.2);letter-spacing:.02em}
        .state-pill{background:rgba(10,132,255,.12);color:#0a84ff;padding:2px 8px;border-radius:20px;font-weight:600;font-size:10px;display:inline-block;border:1px solid rgba(10,132,255,.2);letter-spacing:.02em}
        .brand-pill{background:rgba(48,209,88,.12);color:#30d158;padding:2px 8px;border-radius:20px;font-weight:600;font-size:10px;display:inline-block;border:1px solid rgba(48,209,88,.2);letter-spacing:.02em}
        .origin-pill{background:rgba(255,159,10,.12);color:#ff9f0a;padding:2px 8px;border-radius:20px;font-weight:600;font-size:10px;display:inline-block;border:1px solid rgba(255,159,10,.2);letter-spacing:.02em}

        /* ─── CELL STYLES ─── */
        .id-cell{color:var(--text3);font-family:'SF Mono','Menlo',monospace;font-size:11px;font-weight:600}
        .price-cell{color:var(--brand);font-weight:700;font-size:14px;letter-spacing:-.2px}
        .um-cell{font-weight:600;color:var(--text2)}
        .pack-cell{color:var(--accent);font-weight:600}
        .sup-cell{font-size:13px;font-weight:500;color:var(--text);white-space:normal;line-height:1.4}
        [data-theme="light"] .sup-cell{color:var(--text)}
        .manu-cell{color:var(--text3);font-size:11px;font-family:'SF Mono','Menlo',monospace;font-weight:500}

        /* ─── SEARCH BAR ─── */
        .portal-bar{
            position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
            width:82%;max-width:920px;border-radius:16px;
            background:var(--glass);
            backdrop-filter:blur(40px) saturate(180%);
            -webkit-backdrop-filter:blur(40px) saturate(180%);
            border:1px solid var(--sep);
            display:flex;align-items:center;z-index:1000;
            box-shadow:var(--shadow);overflow:hidden;
        }
        .bar-upload-btn{
            display:flex;align-items:center;justify-content:center;
            width:52px;height:52px;flex-shrink:0;background:none;border:none;
            border-right:1px solid var(--sep);cursor:pointer;
            font-size:18px;color:var(--text2);transition:color .2s;
        }
        .bar-upload-btn:hover{color:var(--text)}
        .bar-search-wrap{flex:1;display:flex;align-items:center;gap:10px;padding:0 16px}
        .bar-search-icon{color:var(--text3);font-size:14px;flex-shrink:0}
        #searchIn{
            background:transparent;border:none;color:var(--text);
            font-size:15px;font-weight:500;outline:none;flex:1;padding:14px 0;
            font-family:inherit;letter-spacing:-.1px;
        }
        #searchIn::placeholder{color:var(--text3)}
        .bar-count{
            font-size:11px;font-weight:600;color:var(--brand);
            background:rgba(48,209,88,.12);border:1px solid rgba(48,209,88,.2);
            border-radius:20px;padding:3px 10px;white-space:nowrap;
            flex-shrink:0;letter-spacing:.02em;
        }
        .bar-exit-btn{
            background:var(--red);border:none;color:#fff;
            padding:0 24px;height:52px;flex-shrink:0;
            font-weight:600;font-size:13px;cursor:pointer;
            font-family:inherit;transition:opacity .2s;
        }
        .bar-exit-btn:hover{opacity:.85}

        /* ─── TOAST & EXTRAS ─── */
        #toast{
            position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
            background:var(--surface2);backdrop-filter:blur(20px);
            border:1px solid var(--sep);color:var(--text);
            padding:8px 20px;border-radius:20px;font-weight:600;font-size:12px;
            display:none;z-index:9999;letter-spacing:.02em;
        }
        #lightbox{
            position:fixed;inset:0;background:rgba(0,0,0,.88);
            backdrop-filter:blur(32px);z-index:9000;display:none;
            align-items:center;justify-content:center;flex-direction:column;
            gap:16px;cursor:zoom-out;
        }
        #lightbox.open{display:flex}
        #lightboxImg{max-width:360px;max-height:360px;border-radius:16px;border:1px solid var(--sep);box-shadow:0 40px 80px rgba(0,0,0,.6);object-fit:contain}
        #lightboxLabel{color:var(--text2);font-size:13px;font-weight:500;text-align:center;max-width:400px;line-height:1.5}
        #aiBadge{
            position:fixed;bottom:100px;right:32px;
            background:var(--surface);border:1px solid var(--sep);
            border-radius:20px;padding:6px 14px;font-size:11px;
            font-weight:600;color:var(--brand);display:none;
            z-index:1001;gap:6px;align-items:center;box-shadow:var(--shadow);
        }
        #aiBadge.visible{display:flex}
        .ai-dot{width:6px;height:6px;border-radius:50%;background:var(--brand);animation:livepulse 1.2s infinite}
        #loadMoreSentinel{height:60px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;font-weight:500;letter-spacing:.04em}
        #fileIn{display:none}
    </style>
</head>
<body onload="document.getElementById('passIn').focus()">

<!-- SIDEBAR -->
<div id="sideMenu">
    <div class="menu-section-label">Preferences</div>
    <button class="menu-item" onclick="toggleTheme();toggleMenu()">
        <div class="menu-icon" style="background:rgba(255,214,10,.15)">🌓</div>
        Toggle Theme
    </button>
    <button class="menu-item" onclick="location.reload()">
        <div class="menu-icon" style="background:rgba(10,132,255,.15)">🔄</div>
        Refresh Data
    </button>
    <button class="menu-item" onclick="clearCache();toggleMenu()">
        <div class="menu-icon" style="background:rgba(255,69,58,.15)">🗑️</div>
        Clear Photo Cache
    </button>
    <button class="menu-close" onclick="toggleMenu()">Close</button>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- LOGIN -->
<div id="loginScreen">
    <div id="knife" class="knife-box">🔪</div>
    <div class="login-logo">
        <img src="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png" alt="Logo">
    </div>
    <div class="login-card">
        <div class="login-title">Master Code Engine</div>
        <div class="login-sub">Chef2Chef · Secure Access</div>
        <input type="password" class="login-input" id="passIn" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkAuth()">
        <button class="login-btn" onclick="checkAuth()">Unlock</button>
        <div id="err"></div>
    </div>
</div>

<!-- OVERLAYS -->
<div id="toast">Copied</div>
<div id="aiBadge"><div class="ai-dot"></div><span id="aiBadgeText">Loading photos…</span></div>
<div id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="">
    <div id="lightboxLabel"></div>
</div>

<!-- NAV -->
<nav class="top-nav">
    <div class="nav-left">
        <div class="traffic-lights">
            <div class="tl tl-red" onclick="toggleMenu()" title="Menu"></div>
            <div class="tl tl-yellow"></div>
            <div class="tl tl-green" onclick="toggleTheme()" title="Toggle Theme"></div>
        </div>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <a href="https://chef2chef.ae" target="_blank" class="logo-text">
            <div class="logo-wrap">
                <img src="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png" class="header-logo" alt="Logo">
            </div>
            Chef2Chef <span class="logo-accent">Master</span>
        </a>
    </div>
    <div class="nav-right">
        <span class="nav-tag">Steve</span>
        <button class="theme-btn" onclick="toggleTheme()" id="navToggle">🌙</button>
    </div>
</nav>

<!-- TABLE -->
<div class="content-container">
    <table>
        <thead>
            <tr>
                <th>Item Code</th>
                <th>Description</th>
                <th>Price (AED)</th>
                <th>UOM</th>
                <th>Pack Size</th>
                <th>Brand</th>
                <th>Supplier</th>
                <th>Manu. Part No.</th>
            </tr>
        </thead>
        <tbody id="list" onclick="handleQuickCopy(event)"></tbody>
    </table>
    <div id="loadMoreSentinel"></div>
</div>

<!-- SEARCH BAR -->
<div class="portal-bar">
    <input type="file" id="fileIn" accept=".csv,.xlsx" onchange="manualUpload(event)">
    <button class="bar-upload-btn" onclick="document.getElementById('fileIn').click()">📁</button>
    <div class="bar-search-wrap">
        <span class="bar-search-icon">🔍</span>
        <input type="text" id="searchIn" placeholder="Search items, suppliers, categories…">
        <span class="bar-count" id="resultCount">—</span>
    </div>
    <button class="bar-exit-btn" onclick="document.getElementById('searchIn').value='';document.getElementById('searchIn').dispatchEvent(new Event('input'))">Clear</button>
</div>

function getCatStyle(desc, cat, brand) {
    const hay = `${desc||''} ${cat||''} ${brand||''}`.toLowerCase();
    for (const [keys, grad, emoji] of CAT_STYLES) {
        if (keys.some(k => hay.includes(k))) return [grad, emoji];
    }
    return ['linear-gradient(135deg,#334155,#0f172a)', '📦'];
}

/* ═══════════════════════════════════════════
   PHOTO SYSTEM
   Layer 1: localStorage cache (instant, free)
   Layer 2: Google Custom Search (100/day free)
   Layer 3: Open Food Facts (unlimited free)
   Layer 4: TheMealDB (unlimited free)
   Layer 5: Unsplash (50/hr free)
   Layer 6: Emoji gradient (always works)
═══════════════════════════════════════════ */
const CACHE_PREFIX = 'c2c_photo_v2_';
const imgCache = new Map();
const imgQueue = [];
let activeFetches = 0;
const MAX_CONCURRENT = 2;

const rowObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const wrap = entry.target;
        rowObserver.unobserve(wrap);
        const q = wrap.dataset.q;

        // Check localStorage first
        try {
            const saved = localStorage.getItem(CACHE_PREFIX + q);
            if (saved !== null) {
                const url = saved === 'null' ? null : saved;
                imgCache.set(q, url);
                setImage(wrap, url);
                return;
            }
        } catch(e) {}

        if (imgCache.has(q)) { setImage(wrap, imgCache.get(q)); return; }
        showSpinner(wrap, true);
        imgQueue.push({ wrap, q });
        drainQueue();
    });
}, { rootMargin: '300px 0px', threshold: 0.01 });

function drainQueue() {
    while (activeFetches < MAX_CONCURRENT && imgQueue.length > 0) {
        const job = imgQueue.shift();
        activeFetches++; refreshBadge();
        lookupImage(job.q)
            .then(url => {
                imgCache.set(job.q, url);
                // Save to localStorage forever
                try { localStorage.setItem(CACHE_PREFIX + job.q, url || 'null'); } catch(e) {}
                setImage(job.wrap, url);
            })
            .finally(() => { activeFetches--; refreshBadge(); drainQueue(); });
    }
}

function refreshBadge() {
    const n = imgQueue.length + activeFetches;
    const badge = document.getElementById('aiBadge');
    if (n > 0) {
        badge.classList.add('visible');
        document.getElementById('aiBadgeText').textContent = `Loading ${n} photo${n>1?'s':''}…`;
    } else { badge.classList.remove('visible'); }
}

async function lookupImage(q) {
    const short = q.split(/\s+/).slice(0,2).join(' ');

    // Layer 1: Google Custom Search
    let url = await fetchGoogle(q);
    if (url) return url;

    // Layer 2: Open Food Facts
    url = await fetchOFF(q);
    if (url) return url;
    if (short !== q) { url = await fetchOFF(short); if (url) return url; }

    // Layer 3: TheMealDB
    url = await fetchMealDB(q);
    if (url) return url;
    if (short !== q) { url = await fetchMealDB(short); if (url) return url; }

    // Layer 4: Unsplash
    url = await fetchUnsplash(q + ' food');
    if (url) return url;

    return null; // emoji gradient fallback
}

async function fetchGoogle(q) {
    try {
        const r = await fetch(
            `https://www.googleapis.com/customsearch/v1?key=${GOOGLE_KEY}&cx=${GOOGLE_CX}&searchType=image&q=${encodeURIComponent(q + ' food product')}&num=1&imgType=photo&imgSize=medium&safe=active`,
            { signal: AbortSignal.timeout(6000) }
        );
        const d = await r.json();
        if (d.items && d.items.length > 0) return d.items[0].link;
    } catch(e) {}
    return null;
}

async function fetchOFF(q) {
    try {
        const r = await fetch(
            `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&json=1&page_size=6&fields=image_front_small_url,image_small_url,image_url`,
            { signal: AbortSignal.timeout(7000) }
        );
        const d = await r.json();
        if (!d.products) return null;
        for (const p of d.products) {
            const img = p.image_front_small_url || p.image_small_url || p.image_url;
            if (img && img.startsWith('https')) return img;
        }
    } catch(e) {}
    return null;
}

async function fetchMealDB(q) {
    try {
        const r = await fetch(
            `https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(q)}`,
            { signal: AbortSignal.timeout(6000) }
        );
        const d = await r.json();
        if (d.meals && d.meals.length > 0 && d.meals[0].strMealThumb)
            return d.meals[0].strMealThumb;
        const ri = await fetch(
            `https://www.themealdb.com/api/json/v1/1/filter.php?i=${encodeURIComponent(q)}`,
            { signal: AbortSignal.timeout(6000) }
        );
        const di = await ri.json();
        if (di.meals && di.meals.length > 0 && di.meals[0].strMealThumb)
            return di.meals[0].strMealThumb;
    } catch(e) {}
    return null;
}

async function fetchUnsplash(q) {
    try {
        const r = await fetch(
            `https://api.unsplash.com/search/photos?query=${encodeURIComponent(q)}&per_page=1&orientation=squarish`,
            { headers: { Authorization: `Client-ID ${UNSPLASH_KEY}` }, signal: AbortSignal.timeout(5000) }
        );
        const d = await r.json();
        if (d.results && d.results.length > 0) return d.results[0].urls.small;
    } catch(e) {}
    return null;
}

function showSpinner(wrap, on) {
    const s = wrap.querySelector('.photo-spinner');
    const dot = wrap.querySelector('.photo-live-dot');
    if (s) s.style.display = on ? 'flex' : 'none';
    if (dot) dot.style.display = on ? 'block' : 'none';
}

function setImage(wrap, url) {
    showSpinner(wrap, false);
    if (!url) return;
    const img = wrap.querySelector('.prod-photo-img');
    if (!img) return;
    img.onload = () => {
        img.classList.add('visible');
        const em = wrap.querySelector('.prod-photo-emoji');
        if (em) em.style.opacity = '0';
    };
    img.onerror = () => {};
    img.src = url;
}

function clearCache() {
    imgCache.clear();
    try {
        Object.keys(localStorage).forEach(k => {
            if (k.startsWith(CACHE_PREFIX)) localStorage.removeItem(k);
        });
    } catch(e) {}
    alert('Photo cache cleared! Reload to fetch fresh photos.');
}

/* ═══════════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════════ */
function openLightbox(url, label) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightboxLabel').textContent = label;
    document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });

/* ═══════════════════════════════════════════
   APP CORE
═══════════════════════════════════════════ */
const PAGE_SIZE = 200;
let db = [], filteredDb = [], currentSearch = '', totalLoaded = 0, renderOffset = 0;

function debounce(fn, ms) {
    let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function toggleMenu() {
    document.getElementById('sideMenu').classList.toggle('active');
    const o = document.getElementById('overlay');
    o.style.display = o.style.display === 'block' ? 'none' : 'block';
}

function toggleTheme() {
    const doc = document.documentElement;
    const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    doc.setAttribute('data-theme', next);
    document.getElementById('navToggle').innerText = next==='light'?'☀️':'🌙';
}

function checkAuth() {
    if (document.getElementById('passIn').value === 'C2C2026') {
        document.getElementById('knife').classList.add('knife-slice');
        setTimeout(() => { document.getElementById('loginScreen').style.display='none'; autoLoad(); }, 400);
    } else {
        document.getElementById('err').innerText = 'Incorrect access code';
    }
}

async function autoLoad() {
    try {
        const r = await fetch('data.csv?v=' + Date.now());
        processData(await r.text());
    } catch(e) {}
}

function manualUpload(e) {
    const r = new FileReader();
    r.onload = ev => processData(ev.target.result);
    r.readAsText(e.target.files[0]);
}

function clean(s) { return String(s||'').replace(/[^\x20-\x7E]/g,'').trim(); }

function processData(csv) {
    try {
        const wb = XLSX.read(csv, { type:'string' });
        const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:'' });
        db = raw.map(r => ({
            id:     clean(r['Item']),
            desc:   clean(r['Description']),
            cost:   clean(r['Cost']).toLowerCase().replace(/aed/g,'').trim(),
            um:     clean(r['Base U/M'] || r['U/M']).split(' (')[0],
            pack:   clean(r['Case Packing'] || r['Case Pack']),
            cat:    clean(r['Cat 2']),
            state:  clean(r['State']),
            sup:    clean(r['Preferred Supplier']),
            brand:  clean(r['Brand']),
            origin: clean(r['Origin'] || 'UAE'),
            manu:   clean(r['Manu. Part No.'] || r['Manu. Par'] || ''),
        }));
        totalLoaded = db.length;
        filteredDb = db;
        renderOffset = 0;
        renderPage(true);
        updateCount();
    } catch(e) { console.error('Data error', e); }
}

function updateCount() {
    const el = document.getElementById('resultCount');
    if (!totalLoaded) return;
    el.textContent = currentSearch
        ? `${filteredDb.length} / ${totalLoaded}`
        : `${Math.min(renderOffset, totalLoaded)} / ${totalLoaded}`;
}

function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function highlight(text) {
    if (!currentSearch || !text) return String(text||'');
    const terms = currentSearch.split(/\s+/).filter(w=>w.length>0);
    let h = String(text);
    terms.forEach(w => {
        h = h.replace(new RegExp(`(${escapeRe(w)})`, 'gi'), '<mark>$1</mark>');
    });
    return h;
}

function renderPage(reset) {
    const list = document.getElementById('list');
    if (reset) { list.innerHTML = ''; renderOffset = 0; }
    const slice = filteredDb.slice(renderOffset, renderOffset + PAGE_SIZE);
    if (!slice.length) { updateSentinel(); return; }
    const frag = document.createDocumentFragment();
    slice.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = buildRow(r);
        frag.appendChild(tr);
    });
    list.appendChild(frag);
    renderOffset += slice.length;
    list.querySelectorAll('.prod-photo-wrap[data-q]:not([data-obs])').forEach(el => {
        el.dataset.obs = '1';
        rowObserver.observe(el);
    });
    updateSentinel();
    updateCount();
}

function updateSentinel() {
    const s = document.getElementById('loadMoreSentinel');
    const remaining = filteredDb.length - renderOffset;
    if (remaining > 0) {
        s.textContent = `↓ ${remaining.toLocaleString()} more items`;
        s.style.display = 'flex';
        sentinelObserver.observe(s);
    } else {
        s.style.display = 'none';
        sentinelObserver.unobserve(s);
    }
}

const sentinelObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
        sentinelObserver.unobserve(entries[0].target);
        renderPage(false);
    }
}, { rootMargin: '200px 0px' });

document.getElementById('searchIn').addEventListener('input', debounce(e => {
    currentSearch = e.target.value.toLowerCase().trim();
    const terms = currentSearch.split(/\s+/).filter(Boolean);
    filteredDb = currentSearch
        ? db.filter(r => {
            const t = `${r.id} ${r.desc} ${r.pack} ${r.cat} ${r.state} ${r.sup} ${r.brand} ${r.manu}`.toLowerCase();
            return terms.every(w => t.includes(w));
          })
        : db;
    renderPage(true);
    updateCount();
}, 200));

function buildQuery(r) {
    const skipWords = [
        'organic','australian','lebanese','fresh','frozen',
        'chilled','fzn','frz','raw','cooked','boneless',
        'skinless','whole','sliced','diced','minced',
        'cleaned','trimmed','peeled','chopped','grilled',
        'smoked','dried','halal','imported','local','uae',
        'abaca','chef2chef','chef 2 chef','alannahs',
        'kibsons','abela','aiad','uns'
    ];
    let desc = r.desc
        .replace(/\(.*?\)/g, '')
        .replace(/\d+[-–]\d+\s*(?:kg|g|ml|l|pc|pcs)?/gi, '')
        .replace(/\d+\s*(?:kg|g|ml|l|pcs|pc|pkt)\.?/gi, '')
        .toLowerCase();
    skipWords.forEach(w => {
        desc = desc.replace(new RegExp('\b'+w+'\b','gi'), '');
    });
    return desc.trim().replace(/\s+/g,' ')
        .split(' ').slice(0,3).join(' ');
}

function buildRow(r) {
    const [grad, emoji] = getCatStyle(r.desc, r.cat, r.brand);
    const q = buildQuery(r).replace(/"/g,'&quot;');
    const descSafe = r.desc.replace(/"/g,'&quot;');
    return `
      <td class="id-cell">${highlight(r.id)}</td>
      <td>
        <div class="desc-cell-inner">
          <div class="prod-photo-wrap" data-q="${q}" data-desc="${descSafe}" onclick="handlePhotoClick(event,this)">
            <div class="prod-photo-bg" style="background:${grad}"></div>
            <div class="prod-photo-emoji">${emoji}</div>
            <img class="prod-photo-img" src="" alt="${descSafe}">
            <div class="photo-spinner">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <circle cx="10" cy="10" r="8" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
                <path d="M10 2a8 8 0 0 1 8 8" stroke="var(--brand)" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="photo-live-dot"></div>
          </div>
          <div class="desc-text-wrap">
            <div class="desc-name">${highlight(r.desc)}</div>
            <div class="desc-pills">
              ${r.cat ? `<span class="cat-pill">${highlight(r.cat)}</span>` : ''}
              ${r.state ? `<span class="state-pill">${highlight(r.state)}</span>` : ''}
            </div>
          </div>
        </div>
      </td>
      <td class="price-cell">${highlight(r.cost)}</td>
      <td class="um-cell">${highlight(r.um)}</td>
      <td class="pack-cell">${highlight(r.pack)}</td>
      <td>${r.brand ? `<span class="brand-pill">${highlight(r.brand)}</span>` : ''}</td>
      <td class="sup-cell">${highlight(r.sup)}</td>
      <td class="manu-cell">${highlight(r.manu)}</td>`;
}

function handlePhotoClick(e, wrap) {
    e.stopPropagation();
    const img = wrap.querySelector('.prod-photo-img');
    if (img && img.classList.contains('visible')) openLightbox(img.src, wrap.dataset.desc||'');
}

function handleQuickCopy(e) {
    if (e.target.closest('.prod-photo-wrap')) return;
    const cell = e.target.closest('td');
    if (!cell) return;
    navigator.clipboard.writeText(cell.innerText).then(() => {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        if (navigator.vibrate) navigator.vibrate(50);
        setTimeout(() => t.style.display='none', 600);
    });
}
