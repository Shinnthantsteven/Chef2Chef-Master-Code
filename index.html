<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chef2Chef | Master Code Engine</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Shinnthantsteven/Chef2Chef-Master-Code/main/logo.png">

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand: #10b981;
            --brand-deep: #059669;
            --bg-color: #020617;
            --card-bg: #0f172a;
            --text: #f1f5f9;
            --glass-edge: rgba(255, 255, 255, 0.15);
            --danger: #ef4444;
            --hl: #fbbf24;
            --input-bg: rgba(0,0,0,0.3);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --glass-edge: rgba(0, 0, 0, 0.15);
            --input-bg: rgba(255,255,255,0.4);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-color); color: var(--text); 
            height: 100vh; overflow: hidden; 
            transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-wrap {
            width: 42px; height: 42px;
            background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 2px solid var(--brand);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
            flex-shrink: 0; clip-path: circle(50% at 50% 50%);
        }

        .header-logo { 
            width: 100%; height: 100%;
            object-fit: cover;
            image-rendering: -webkit-optimize-contrast;
            transform: translateZ(0);
        }

        mark { background: var(--hl); color: #000; border-radius: 4px; padding: 2px 4px; font-weight: 800; box-shadow: 0 0 12px rgba(251, 191, 36, 0.6); }

        /* ── SIDE MENU ── */
        #sideMenu {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--card-bg); z-index: 3000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-right: 1px solid var(--glass-edge); padding: 40px 20px; box-sizing: border-box;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        #sideMenu.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 2500; backdrop-filter: blur(8px); }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 12px; background: rgba(255,255,255,0.05); font-weight: 700; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .menu-item:hover { background: rgba(255,255,255,0.08); border-color: var(--brand); }
        .menu-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin: 20px 0 10px 15px; font-weight: 800; }

        /* ── GLASS NAV ── */
        .top-nav { 
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; 
            background: transparent;
            border-bottom: 1.5px solid rgba(255,255,255,0.18);
            position: sticky; top: 0; z-index: 2000;
        }
        [data-theme="light"] .top-nav { border-bottom-color: rgba(0,0,0,0.1); }

        .menu-btn { font-size: 26px; cursor: pointer; color: var(--brand); }
        .logo-text { font-weight: 800; font-size: 20px; display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit; letter-spacing: -0.5px; }

        /* ── LOGIN ── */
        #loginScreen { position: fixed; inset: 0; background: var(--bg-color); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .knife-box { font-size: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 25px var(--brand)); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .knife-slice { transform: scale(15) translateX(100px) rotate(45deg); opacity: 0; }

        .login-card { 
            background: rgba(128,128,128,0.05); padding: 50px; border-radius: 40px; 
            border: 1px solid var(--glass-edge); text-align: center; width: 440px; 
            backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-card h1 { font-size: 24px; margin-bottom: 8px; font-weight: 800; }
        .login-card input { 
            width: 100%; box-sizing: border-box; padding: 20px; border-radius: 20px; 
            border: 1px solid var(--glass-edge); background: var(--input-bg); 
            color: var(--text); font-weight: 600; font-size: 20px; outline: none; 
            text-align: center; margin-top: 20px; transition: 0.3s;
        }
        .login-card input:focus { border-color: var(--brand); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .unlock-btn { width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--brand); color: white; font-weight: 800; cursor: pointer; margin-top: 20px; transition: 0.3s; font-family: 'Plus Jakarta Sans', sans-serif; }
        .unlock-btn:hover { background: var(--brand-deep); transform: translateY(-1px); }

        /* ── TABLE ── */
        .content-container {
            flex: 1; overflow-y: auto; padding: 0 40px 180px 40px; height: calc(100vh - 80px);
            mask-image: linear-gradient(to bottom, black 78%, rgba(0,0,0,0.15) 93%, rgba(0,0,0,0.08) 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 78%, rgba(0,0,0,0.15) 93%, rgba(0,0,0,0.08) 100%);
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }

        /* ── TUBE HEADER ── */
        thead tr th {
            position: sticky; top: 8px;
            background: #0d1829;
            padding: 20px 12px;
            text-align: left; font-size: 10px;
            color: #94a3b8; text-transform: uppercase;
            z-index: 50; letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            border-left: none; border-right: none;
        }
        [data-theme="light"] thead tr th {
            background: #334155;
            color: #e2e8f0;
            border-top-color: rgba(255,255,255,0.15);
            border-bottom-color: rgba(255,255,255,0.15);
        }
        thead tr th:first-child {
            border-radius: 20px 0 0 20px;
            border-left: 1px solid rgba(255,255,255,0.08);
            padding-left: 24px;
        }
        thead tr th:last-child {
            border-radius: 0 20px 20px 0;
            border-right: 1px solid rgba(255,255,255,0.08);
            padding-right: 24px;
        }

        /* Column widths — photo now embedded in description cell */
        th:nth-child(1) { width: 75px; }
        th:nth-child(2) { width: 44%; }
        th:nth-child(3) { width: 60px; }
        th:nth-child(4) { width: 45px; }
        th:nth-child(5) { width: 90px; }
        th:nth-child(6) { width: 13%; }
        th:nth-child(7) { width: 130px; }
        th:nth-child(8) { width: 20px; }

        td { 
            padding: 10px 12px; border-bottom: 1px solid var(--glass-edge); 
            font-size: 13px; cursor: pointer; vertical-align: middle; 
            transition: background 0.2s; overflow: hidden; text-overflow: ellipsis; 
        }
        tr:hover td { background: rgba(255,255,255,0.02); }
        
        /* ── DESCRIPTION CELL with embedded photo ── */
        .desc-cell-inner {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* ── PRODUCT PHOTO THUMBNAIL ── */
        .prod-photo-wrap {
            width: 60px;
            height: 60px;
            flex-shrink: 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-edge);
            background: rgba(255,255,255,0.04);
            position: relative;
            cursor: zoom-in;
        }

        .prod-photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease, opacity 0.4s ease;
            opacity: 0;
        }
        .prod-photo-wrap img.loaded { opacity: 1; }
        .prod-photo-wrap img:hover { transform: scale(1.08); }

        /* Skeleton shimmer while loading */
        .photo-skeleton {
            position: absolute; inset: 0;
            background: linear-gradient(
                90deg,
                rgba(255,255,255,0.03) 0%,
                rgba(255,255,255,0.08) 50%,
                rgba(255,255,255,0.03) 100%
            );
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
            border-radius: 12px;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Fallback icon when no image found */
        .photo-fallback {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; opacity: 0.25;
        }

        /* AI fetch indicator — tiny pulse dot */
        .photo-ai-dot {
            position: absolute; top: 5px; right: 5px;
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--brand);
            animation: pulse-dot 1.2s ease-in-out infinite;
            z-index: 2;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        .desc-name { font-weight: 700; font-size: 15px; line-height: 1.4; margin-bottom: 6px; }
        .pack-cell { display: flex; flex-direction: column; gap: 5px; align-items: flex-start; }
        .pack-value { color: #818cf8; font-weight: 700; }

        .sup-cell { color: #e2e8f0; font-size: 14px; font-weight: 700; white-space: normal; line-height: 1.4; }
        [data-theme="light"] .sup-cell { color: #1e293b; }

        /* Pills */
        .cat-pill    { background: rgba(251,191,36,0.12); color: #fbbf24; padding: 3px 9px; border-radius: 20px; font-weight: 800; font-size: 10px; display: inline-block; border: 1px solid rgba(251,191,36,0.3); letter-spacing: 0.3px; }
        .state-pill  { background: rgba(6,182,212,0.12);  color: #22d3ee; padding: 3px 9px; border-radius: 20px; font-weight: 800; font-size: 10px; display: inline-block; border: 1px solid rgba(6,182,212,0.3); letter-spacing: 0.3px; }
        .brand-pill  { background: rgba(59,130,246,0.1);  color: #60a5fa; padding: 3px 9px; border-radius: 20px; font-weight: 800; font-size: 10px; display: inline-block; border: 1px solid rgba(59,130,246,0.25); }
        .origin-pill { background: rgba(16,185,129,0.1);  color: var(--brand); padding: 3px 9px; border-radius: 20px; font-weight: 800; font-size: 10px; display: inline-block; border: 1px solid rgba(16,185,129,0.25); }

        /* ══ PURE GLASS SEARCH BAR ══ */
        .portal-bar {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 1100px;
            border-radius: 100px;
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.28);
            display: flex; align-items: center;
            z-index: 1000;
            transition: border-color 0.3s;
        }

        .portal-bar::before {
            content: '';
            position: absolute;
            top: -1.5px; left: 12%; right: 12%; height: 3px;
            background: linear-gradient(90deg,
                transparent,
                rgba(255,255,255,0.9) 40%,
                rgba(255,255,255,1.0) 50%,
                rgba(255,255,255,0.9) 60%,
                transparent);
            border-radius: 999px;
            pointer-events: none; z-index: 10;
        }

        .portal-bar:focus-within { border-color: rgba(16,185,129,0.6); }
        .portal-bar:focus-within::before {
            background: linear-gradient(90deg,
                transparent,
                rgba(16,185,129,0.8) 40%,
                rgba(16,185,129,1.0) 50%,
                rgba(16,185,129,0.8) 60%,
                transparent);
        }

        [data-theme="light"] .portal-bar { border-color: rgba(0,0,0,0.2); }
        [data-theme="light"] .portal-bar::before {
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0.25) 50%, rgba(0,0,0,0.15) 60%, transparent);
        }

        .bar-upload-btn {
            display: flex; align-items: center; justify-content: center;
            width: 58px; height: 56px; flex-shrink: 0;
            background: none; border: none;
            border-right: 1px solid rgba(255,255,255,0.15);
            cursor: pointer; font-size: 22px; opacity: 0.55;
            transition: opacity 0.2s;
        }
        .bar-upload-btn:hover { opacity: 1; }

        .bar-search-wrap { flex: 1; display: flex; align-items: center; gap: 12px; padding: 0 20px; }
        .bar-search-icon { font-size: 15px; opacity: 0.5; flex-shrink: 0; }

        #searchIn { 
            background: transparent; border: none; color: var(--text); 
            font-size: 15px; font-weight: 700; outline: none; flex: 1;
            padding: 18px 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        #searchIn::placeholder { color: var(--text); opacity: 0.4; }

        .bar-count {
            font-size: 11px; font-weight: 800; color: var(--brand);
            background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.35);
            border-radius: 50px; padding: 4px 12px;
            white-space: nowrap; flex-shrink: 0; letter-spacing: 0.3px;
        }

        .bar-exit-btn {
            background: var(--danger); border: none; color: white;
            padding: 0 30px; height: 56px;
            border-radius: 0 100px 100px 0;
            font-weight: 800; font-size: 13px; cursor: pointer;
            flex-shrink: 0; letter-spacing: 0.5px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.2s;
            box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset;
        }
        .bar-exit-btn:hover { background: #dc2626; }

        #toast {
            position: fixed; bottom: 170px; left: 50%; transform: translateX(-50%);
            background: rgba(16,185,129,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16,185,129,0.35);
            color: var(--brand); padding: 10px 30px; border-radius: 50px;
            font-weight: 800; font-size: 13px;
            display: none; z-index: 9999;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        }

        /* ── IMAGE LIGHTBOX ── */
        #lightbox {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            z-index: 9000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            cursor: zoom-out;
        }
        #lightbox.open { display: flex; }
        #lightbox img {
            max-width: 420px;
            max-height: 420px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            object-fit: contain;
            background: rgba(255,255,255,0.03);
        }
        #lightboxLabel {
            color: #94a3b8; font-size: 13px; font-weight: 700; text-align: center;
            max-width: 400px; line-height: 1.5;
        }

        /* ── AI STATUS BADGE (floating) ── */
        #aiBadge {
            position: fixed;
            bottom: 170px;
            right: 40px;
            background: rgba(16,185,129,0.12);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 50px;
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 800;
            color: var(--brand);
            display: none;
            z-index: 1001;
            letter-spacing: 0.3px;
            gap: 8px;
            align-items: center;
        }
        #aiBadge.visible { display: flex; }
        .ai-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--brand);
            animation: pulse-dot 1s infinite;
        }
    </style>
</head>

<script>
let db = [];
let currentSearch = "";
let totalLoaded = 0;

/* ══════════════════════════════════════════
   IMAGE CACHE + QUEUE SYSTEM
══════════════════════════════════════════ */
const imageCache = new Map();   // query → url | 'none'
const imageQueue = [];          // pending fetch items
let activeFetches = 0;
const MAX_CONCURRENT = 2;
let aiFetchCount = 0;

// IntersectionObserver: triggers lazy image loads
const imgObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const wrap = entry.target;
            const query = wrap.dataset.query;
            if (!query) return;
            imgObserver.unobserve(wrap);

            if (imageCache.has(query)) {
                applyImage(wrap, imageCache.get(query));
            } else {
                // Show skeleton + ai dot
                wrap.querySelector('.photo-skeleton') && (wrap.querySelector('.photo-skeleton').style.display = 'block');
                wrap.querySelector('.photo-ai-dot') && (wrap.querySelector('.photo-ai-dot').style.display = 'block');
                imageQueue.push({ wrap, query });
                drainQueue();
            }
        }
    });
}, { rootMargin: '200px 0px', threshold: 0.01 });

function drainQueue() {
    while (activeFetches < MAX_CONCURRENT && imageQueue.length > 0) {
        const job = imageQueue.shift();
        activeFetches++;
        updateAiBadge();
        fetchProductImage(job.query).then(url => {
            imageCache.set(job.query, url || 'none');
            applyImage(job.wrap, url || 'none');
        }).catch(() => {
            imageCache.set(job.query, 'none');
            applyImage(job.wrap, 'none');
        }).finally(() => {
            activeFetches--;
            updateAiBadge();
            drainQueue();
        });
    }
}

function updateAiBadge() {
    const badge = document.getElementById('aiBadge');
    const pending = imageQueue.length + activeFetches;
    if (pending > 0) {
        badge.classList.add('visible');
        document.getElementById('aiBadgeText').textContent = `AI LOADING ${pending} PHOTO${pending > 1 ? 'S' : ''}…`;
    } else {
        badge.classList.remove('visible');
    }
}

function applyImage(wrap, url) {
    const skeleton = wrap.querySelector('.photo-skeleton');
    const aiDot = wrap.querySelector('.photo-ai-dot');
    const img = wrap.querySelector('img');
    const fallback = wrap.querySelector('.photo-fallback');

    if (skeleton) skeleton.style.display = 'none';
    if (aiDot) aiDot.style.display = 'none';

    if (!url || url === 'none') {
        if (fallback) fallback.style.display = 'flex';
        return;
    }

    if (img) {
        img.onload = () => { img.classList.add('loaded'); };
        img.onerror = () => {
            img.style.display = 'none';
            if (fallback) fallback.style.display = 'flex';
        };
        img.src = url;
        img.dataset.fullsrc = url;
    }
}

/* ── ANTHROPIC API: fetch product image URL ── */
async function fetchProductImage(query) {
    try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 300,
                tools: [{ "type": "web_search_20250305", "name": "web_search" }],
                system: `You are a product image URL extractor for a food service supplier catalog. 
Given a product description, search the web for it and find a direct image URL (CDN link ending in .jpg, .jpeg, .png, or .webp) showing the product packaging or the product itself.

Respond ONLY with a raw JSON object on a single line, no markdown, no explanation:
{"url": "https://..."}

If you cannot find a direct image URL, respond:
{"url": null}

Priority sources: manufacturer websites, Amazon product images (images-na.ssl-images-amazon.com), distributor sites, food supplier CDNs.`,
                messages: [{
                    role: "user",
                    content: `Find product packaging image URL for: ${query}`
                }]
            })
        });

        const data = await response.json();
        if (!data || !data.content) return null;

        const textBlocks = data.content.filter(b => b.type === 'text').map(b => b.text).join('');

        // Try JSON parse first
        const jsonMatch = textBlocks.match(/\{"url"\s*:\s*"([^"]+)"\}/);
        if (jsonMatch && jsonMatch[1] && jsonMatch[1] !== 'null') return jsonMatch[1];

        // Fallback: extract any direct image URL
        const urlMatch = textBlocks.match(/https?:\/\/[^\s"<>]+?(?:\.jpg|\.jpeg|\.png|\.webp)(?:\?[^\s"<>]*)?/i);
        return urlMatch ? urlMatch[0] : null;

    } catch(e) {
        console.warn('Image fetch failed for:', query, e);
        return null;
    }
}

/* ══════════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════════ */
function openLightbox(url, label) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightboxLabel').textContent = label;
    document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
});

   EXISTING LOGIC
══════════════════════════════════════════ */
function toggleMenu() {
    document.getElementById('sideMenu').classList.toggle('active');
    const overlay = document.getElementById('overlay');
    overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
}

function toggleTheme() {
    const doc = document.documentElement;
    const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    doc.setAttribute('data-theme', next);
    document.getElementById('navToggle').innerText = next === 'light' ? '☀️' : '🌙';
}

function checkAuth() {
    if(document.getElementById('passIn').value === 'C2C2026') {
        document.getElementById('knife').classList.add('knife-slice');
        setTimeout(() => {
            document.getElementById('loginScreen').style.display = 'none';
            autoLoad();
        }, 400);
    } else {
        document.getElementById('err').innerText = "ACCESS DENIED: INCORRECT CODE";
    }
}

async function autoLoad() {
    try {
        const res = await fetch('data.csv?v=' + Date.now());
        const text = await res.text();
        processData(text);
    } catch(e) { console.log("Auto-load failed. Manual upload required."); }
}

function manualUpload(e) {
    const reader = new FileReader();
    reader.onload = (event) => processData(event.target.result);
    reader.readAsText(e.target.files[0]);
}

function cleanString(str) {
    return String(str || "").replace(/[^\x20-\x7E]/g, '').trim();
}

function processData(csv) {
    try {
        const wb = XLSX.read(csv, { type: 'string' });
        const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
        db = raw.map(r => ({
            id:     cleanString(r['Item']),
            desc:   cleanString(r['Description']),
            cost:   cleanString(r['Cost']).toLowerCase().replace(/aed/g, '').trim(),
            um:     cleanString(r['Base U/M']).split(' (')[0],
            pack:   cleanString(r['Case Packing'] || r['Case Pack']),
            cat:    cleanString(r['Cat 2']),
            state:  cleanString(r['State']),
            sup:    cleanString(r['Preferred Supplier']),
            brand:  cleanString(r['Brand']),
            origin: cleanString(r['Origin'] || "UAE"),
            manu:   cleanString(r['Manu. Part No.'] || r['Manu. Par'])
        }));
        totalLoaded = db.length;
        render(db);
        updateCount(db.length);
    } catch(e) { console.log("Data processing error."); }
}

function updateCount(n) {
    const el = document.getElementById('resultCount');
    if (totalLoaded > 0) {
        el.textContent = currentSearch ? `${n} / ${totalLoaded}` : `${n} items`;
    }
}

function highlight(text) {
    if (!currentSearch || !text) return text;
    const terms = currentSearch.split(/\s+/).filter(w => w.length > 0);
    let highlighted = text;
    terms.forEach(word => {
        const reg = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        highlighted = highlighted.replace(reg, '<mark>$1</mark>');
    });
    return highlighted;
}

document.getElementById('searchIn').addEventListener('input', (e) => {
    currentSearch = e.target.value.toLowerCase().trim();
    const terms = currentSearch.split(/\s+/);
    const filtered = currentSearch
        ? db.filter(r => {
            const rowText = `${r.id} ${r.desc} ${r.pack} ${r.cat} ${r.state} ${r.sup} ${r.brand} ${r.manu}`.toLowerCase();
            return terms.every(term => rowText.includes(term));
          })
        : db;
    render(filtered);
    updateCount(filtered.length);
});

/* Build image search query from row data */
function buildImageQuery(r) {
    const parts = [];
    if (r.brand && r.brand.length > 1) parts.push(r.brand);
    // Take first 4 words of description max
    const descWords = r.desc.replace(/\(.*?\)/g, '').trim().split(/\s+/).slice(0, 4).join(' ');
    if (descWords) parts.push(descWords);
    if (r.cat) parts.push(r.cat);
    parts.push('product packaging');
    return parts.join(' ');
}

/* Emoji fallback based on category */
function catEmoji(cat) {
    const c = (cat || '').toLowerCase();
    if (c.includes('meat') || c.includes('beef') || c.includes('lamb') || c.includes('poultry')) return '🥩';
    if (c.includes('fish') || c.includes('seafood')) return '🐟';
    if (c.includes('dairy') || c.includes('cheese') || c.includes('milk')) return '🧀';
    if (c.includes('veg') || c.includes('fruit') || c.includes('produce')) return '🥦';
    if (c.includes('bakery') || c.includes('bread') || c.includes('pastry')) return '🥐';
    if (c.includes('spice') || c.includes('herb') || c.includes('sauce') || c.includes('condiment')) return '🧂';
    if (c.includes('oil') || c.includes('fat')) return '🫙';
    if (c.includes('rice') || c.includes('grain') || c.includes('cereal') || c.includes('pasta')) return '🌾';
    if (c.includes('frozen')) return '🧊';
    if (c.includes('beverage') || c.includes('drink') || c.includes('juice')) return '🥤';
    if (c.includes('can') || c.includes('tin') || c.includes('preserved')) return '🥫';
    return '📦';
}

function render(data) {
    const list = document.getElementById('list');
    list.innerHTML = data.slice(0, 100).map(r => {
        const imgQuery = buildImageQuery(r);
        const emoji = catEmoji(r.cat);
        return `
        <tr>
            <td style="color:#64748b; font-family:monospace; font-weight:700; font-size:11px;">${highlight(r.id)}</td>
            <td>
                <div class="desc-cell-inner">
                    <div class="prod-photo-wrap" 
                         data-query="${imgQuery.replace(/"/g, '&quot;')}"
                         data-desc="${r.desc.replace(/"/g, '&quot;')}"
                         onclick="handlePhotoClick(event, this)">
                        <div class="photo-skeleton"></div>
                        <div class="photo-ai-dot" style="display:none;"></div>
                        <div class="photo-fallback">${emoji}</div>
                        <img src="" alt="${r.desc}" loading="lazy">
                    </div>
                    <div>
                        <div class="desc-name">${highlight(r.desc)}</div>
                        ${r.cat ? `<span class="cat-pill">${highlight(r.cat)}</span>` : ''}
                    </div>
                </div>
            </td>
            <td style="color:var(--brand); font-weight:800; font-size:15px;">${r.cost}</td>
            <td style="font-weight:700;">${highlight(r.um)}</td>
            <td>
                <div class="pack-cell">
                    <span class="pack-value">${highlight(r.pack)}</span>
                    ${r.state ? `<span class="state-pill">${highlight(r.state)}</span>` : ''}
                </div>
            </td>
            <td class="sup-cell">${highlight(r.sup)}</td>
            <td>
                <span class="brand-pill">${highlight(r.brand)}</span>
                <span class="origin-pill">${highlight(r.origin)}</span>
            </td>
            <td style="color:#64748b; font-size:11px; font-family:monospace;">${highlight(r.manu)}</td>
        </tr>
    `}).join('');

    // Observe all new photo wraps
    list.querySelectorAll('.prod-photo-wrap[data-query]').forEach(el => {
        imgObserver.observe(el);
    });
}

/* Photo click: open lightbox OR copy cell */
function handlePhotoClick(e, wrap) {
    e.stopPropagation();
    const img = wrap.querySelector('img');
    if (img && img.src && img.classList.contains('loaded')) {
        openLightbox(img.src, wrap.dataset.desc || '');
    }
    // else: do nothing, let IntersectionObserver handle the load
}

function handleQuickCopy(e) {
    const cell = e.target.closest('td');
    if (!cell) return;
    // Don't copy if clicking on photo wrap
    if (e.target.closest('.prod-photo-wrap')) return;
    navigator.clipboard.writeText(cell.innerText).then(() => {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        if (window.navigator.vibrate) window.navigator.vibrate(50);
        setTimeout(() => { toast.style.display = 'none'; }, 600);
    });
}
