    <title>Chef2Chef | Master Code Engine</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#10b981">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>

        :root {

            --brand:#10b981; --brand-deep:#059669; --bg-color:#020617;

            --card-bg:#0f172a; --text:#f1f5f9; --glass-edge:rgba(255,255,255,0.15);

            --danger:#ef4444; --hl:#fbbf24; --input-bg:rgba(0,0,0,0.3);

        }

        [data-theme="light"] {

            --bg-color:#f8fafc; --card-bg:#fff; --text:#0f172a;

            --glass-edge:rgba(0,0,0,0.15); --input-bg:rgba(255,255,255,0.4);

        }

        *,*::before,*::after{box-sizing:border-box}

        body,html{margin:0;padding:0;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg-color);color:var(--text);height:100vh;overflow:hidden;transition:background .3s}

        .logo-wrap{width:42px;height:42px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid var(--brand);box-shadow:0 0 12px rgba(16,185,129,.4);flex-shrink:0}

        .header-logo{width:100%;height:100%;object-fit:cover}

        mark{background:var(--hl);color:#000;border-radius:4px;padding:2px 4px;font-weight:800;box-shadow:0 0 12px rgba(251,191,36,.6)}

        #sideMenu{position:fixed;left:-280px;top:0;width:280px;height:100%;background:var(--card-bg);z-index:3000;transition:.4s cubic-bezier(.16,1,.3,1);border-right:1px solid var(--glass-edge);padding:40px 20px;box-shadow:20px 0 50px rgba(0,0,0,.5)}

        #sideMenu.active{left:0}

        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;z-index:2500;backdrop-filter:blur(8px)}

        .menu-item{padding:15px;margin-bottom:10px;border-radius:12px;background:rgba(255,255,255,.05);font-weight:700;cursor:pointer;border:1px solid transparent;transition:.2s}

        .menu-item:hover{background:rgba(255,255,255,.08);border-color:var(--brand)}

        .menu-label{font-size:11px;color:#94a3b8;text-transform:uppercase;margin:20px 0 10px 15px;font-weight:800}

        .top-nav{padding:15px 40px;display:flex;justify-content:space-between;align-items:center;background:transparent;border-bottom:1.5px solid rgba(255,255,255,.18);position:sticky;top:0;z-index:2000}

        [data-theme="light"] .top-nav{border-bottom-color:rgba(0,0,0,.1)}

        .menu-btn{font-size:26px;cursor:pointer;color:var(--brand)}

        .logo-text{font-weight:800;font-size:20px;display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;letter-spacing:-.5px}

        #loginScreen{position:fixed;inset:0;background:var(--bg-color);z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center}

        .knife-box{font-size:80px;margin-bottom:20px;filter:drop-shadow(0 0 25px var(--brand));transition:.5s cubic-bezier(.4,0,.2,1)}

        .knife-slice{transform:scale(15) translateX(100px) rotate(45deg);opacity:0}

        .login-card{background:rgba(128,128,128,.05);padding:50px;border-radius:40px;border:1px solid var(--glass-edge);text-align:center;width:440px;backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}

        .login-card h1{font-size:24px;margin-bottom:8px;font-weight:800}

        .login-card input{width:100%;padding:20px;border-radius:20px;border:1px solid var(--glass-edge);background:var(--input-bg);color:var(--text);font-weight:600;font-size:20px;outline:none;text-align:center;margin-top:20px;transition:.3s;font-family:'Plus Jakarta Sans',sans-serif}

        .login-card input:focus{border-color:var(--brand);box-shadow:0 0 15px rgba(16,185,129,.2)}

        .unlock-btn{width:100%;padding:20px;border-radius:20px;border:none;background:var(--brand);color:#fff;font-weight:800;cursor:pointer;margin-top:20px;transition:.3s;font-family:'Plus Jakarta Sans',sans-serif}

        .unlock-btn:hover{background:var(--brand-deep);transform:translateY(-1px)}

        .content-container{flex:1;overflow-y:auto;padding:0 40px 180px 40px;height:calc(100vh - 80px);mask-image:linear-gradient(to bottom,black 78%,rgba(0,0,0,.15) 93%,rgba(0,0,0,.08) 100%);-webkit-mask-image:linear-gradient(to bottom,black 78%,rgba(0,0,0,.15) 93%,rgba(0,0,0,.08) 100%)}

        table{width:100%;border-collapse:collapse;table-layout:fixed}

        thead tr th{position:sticky;top:8px;background:#0d1829;padding:16px 12px;text-align:left;font-size:10px;color:#94a3b8;text-transform:uppercase;z-index:50;letter-spacing:1px;border-top:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.08);border-left:none;border-right:none}

        [data-theme="light"] thead tr th{background:#334155;color:#e2e8f0}

        thead tr th:first-child{border-radius:20px 0 0 20px;border-left:1px solid rgba(255,255,255,.08);padding-left:24px}

        thead tr th:last-child{border-radius:0 20px 20px 0;border-right:1px solid rgba(255,255,255,.08);padding-right:24px}

        th:nth-child(1){width:100px} th:nth-child(2){width:30%} th:nth-child(3){width:85px}

        th:nth-child(4){width:55px} th:nth-child(5){width:110px} th:nth-child(6){width:110px} th:nth-child(7){width:14%} th:nth-child(8){width:130px}

        td{padding:6px 12px;border-bottom:1px solid var(--glass-edge);font-size:13px;cursor:pointer;vertical-align:middle;transition:background .2s;overflow:hidden;text-overflow:ellipsis}

        tr:hover td{background:rgba(255,255,255,.02)}

        td:first-child{padding-left:24px}

        .desc-cell-inner{display:flex;align-items:center;gap:12px}

        .desc-text-wrap{flex:1;min-width:0}

        .desc-name{font-weight:700;font-size:14px;line-height:1.4;margin-bottom:5px}

        .desc-pills{display:flex;gap:5px;flex-wrap:wrap}



        /* ══ PRODUCT PHOTO ══ */

        .prod-photo-wrap{width:56px;height:56px;flex-shrink:0;border-radius:12px;overflow:hidden;border:1px solid var(--glass-edge);position:relative;cursor:zoom-in}

        .prod-photo-bg{position:absolute;inset:0;border-radius:12px}

        .prod-photo-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;z-index:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));transition:opacity .4s}

        .prod-photo-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .5s;z-index:2;border-radius:12px}

        .prod-photo-img.visible{opacity:1}

        .photo-spinner{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:3}

        .photo-spinner svg{animation:spin 1s linear infinite}

        @keyframes spin{to{transform:rotate(360deg)}}

        .photo-live-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--brand);z-index:4;display:none;animation:livepulse 1s ease-in-out infinite}

        @keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}



        .pack-value{color:#818cf8;font-weight:700}

        .sup-cell{color:#e2e8f0;font-size:13px;font-weight:700;white-space:normal;line-height:1.4}

        [data-theme="light"] .sup-cell{color:#1e293b}

        .manu-cell{color:#64748b;font-size:11px;font-family:monospace;font-weight:700}

        .cat-pill{background:rgba(251,191,36,.12);color:#fbbf24;padding:3px 9px;border-radius:20px;font-weight:800;font-size:10px;display:inline-block;border:1px solid rgba(251,191,36,.3);letter-spacing:.3px}

        .state-pill{background:rgba(6,182,212,.12);color:#22d3ee;padding:3px 9px;border-radius:20px;font-weight:800;font-size:10px;display:inline-block;border:1px solid rgba(6,182,212,.3);letter-spacing:.3px}

        .brand-pill{background:rgba(59,130,246,.1);color:#60a5fa;padding:3px 9px;border-radius:20px;font-weight:800;font-size:10px;display:inline-block;border:1px solid rgba(59,130,246,.25)}

        .origin-pill{background:rgba(16,185,129,.1);color:var(--brand);padding:3px 9px;border-radius:20px;font-weight:800;font-size:10px;display:inline-block;border:1px solid rgba(16,185,129,.25)}



        .portal-bar{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);width:85%;max-width:1100px;border-radius:100px;background:transparent;border:1.5px solid rgba(255,255,255,.28);display:flex;align-items:center;z-index:1000;transition:border-color .3s}

        .portal-bar::before{content:'';position:absolute;top:-1.5px;left:12%;right:12%;height:3px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.9) 40%,#fff 50%,rgba(255,255,255,.9) 60%,transparent);border-radius:999px;pointer-events:none;z-index:10}

        .portal-bar:focus-within{border-color:rgba(16,185,129,.6)}

        .portal-bar:focus-within::before{background:linear-gradient(90deg,transparent,rgba(16,185,129,.8) 40%,var(--brand) 50%,rgba(16,185,129,.8) 60%,transparent)}

        [data-theme="light"] .portal-bar{border-color:rgba(0,0,0,.2)}

        .bar-upload-btn{display:flex;align-items:center;justify-content:center;width:58px;height:56px;flex-shrink:0;background:none;border:none;border-right:1px solid rgba(255,255,255,.15);cursor:pointer;font-size:22px;opacity:.55;transition:opacity .2s}

        .bar-upload-btn:hover{opacity:1}

        .bar-search-wrap{flex:1;display:flex;align-items:center;gap:12px;padding:0 20px}

        .bar-search-icon{font-size:15px;opacity:.5;flex-shrink:0}

        #searchIn{background:transparent;border:none;color:var(--text);font-size:15px;font-weight:700;outline:none;flex:1;padding:18px 0;font-family:'Plus Jakarta Sans',sans-serif}

        #searchIn::placeholder{color:var(--text);opacity:.4}

        .bar-count{font-size:11px;font-weight:800;color:var(--brand);background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.35);border-radius:50px;padding:4px 12px;white-space:nowrap;flex-shrink:0;letter-spacing:.3px}

        .bar-exit-btn{background:var(--danger);border:none;color:#fff;padding:0 30px;height:56px;border-radius:0 100px 100px 0;font-weight:800;font-size:13px;cursor:pointer;flex-shrink:0;font-family:'Plus Jakarta Sans',sans-serif;transition:background .2s;letter-spacing:.5px}

        .bar-exit-btn:hover{background:#dc2626}

        #toast{position:fixed;bottom:170px;left:50%;transform:translateX(-50%);background:rgba(16,185,129,.15);backdrop-filter:blur(20px);border:1px solid rgba(16,185,129,.35);color:var(--brand);padding:10px 30px;border-radius:50px;font-weight:800;font-size:13px;display:none;z-index:9999}

        #lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(24px);z-index:9000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;cursor:zoom-out}

        #lightbox.open{display:flex}

        #lightboxImg{max-width:380px;max-height:380px;border-radius:24px;border:1px solid rgba(255,255,255,.15);box-shadow:0 40px 80px rgba(0,0,0,.5);object-fit:contain}

        #lightboxLabel{color:#94a3b8;font-size:13px;font-weight:700;text-align:center;max-width:400px;line-height:1.5}

        #aiBadge{position:fixed;bottom:170px;right:40px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:50px;padding:8px 16px;font-size:11px;font-weight:800;color:var(--brand);display:none;z-index:1001;gap:8px;align-items:center}

        #aiBadge.visible{display:flex}

        .ai-dot{width:7px;height:7px;border-radius:50%;background:var(--brand);animation:livepulse 1s infinite}

        #loadMoreSentinel{height:60px;display:flex;align-items:center;justify-content:center;color:#475569;font-size:12px;font-weight:700;letter-spacing:.5px}

        #fileIn{display:none}

    </style>

</head>

    [['nut','almond','cashew','pistachio','walnut','hazelnut','peanut','pecan'],'linear-gradient(135deg,#a16207,#78350f)','🥜'],

    [['chip','crisp','popcorn','pretzel','cracker','snack'],'linear-gradient(135deg,#eab308,#ca8a04)','🍿'],

    [['christmas','xmas','tinsel','garland','ribbon','ornament'],'linear-gradient(135deg,#dc2626,#16a34a)','🎄'],

    [['cleaning','detergent','sanitiser','sanitizer'],'linear-gradient(135deg,#0891b2,#0e7490)','🧴'],

    [['equipment','utensil','knife','tool','glove','container','packaging','disposable'],'linear-gradient(135deg,#475569,#1e293b)','📦'],

];



function getCatStyle(desc, cat, brand) {

    const hay = `${desc||''} ${cat||''} ${brand||''}`.toLowerCase();

    for (const [keys, grad, emoji] of CAT_STYLES) {

        if (keys.some(k => hay.includes(k))) return [grad, emoji];

    }

    return ['linear-gradient(135deg,#334155,#0f172a)', '📦'];

}



/* ═══════════════════════════════════════════

   PHOTO SYSTEM

   Layer 1: localStorage cache (instant, free)

   Layer 2: Google Custom Search (100/day free)

   Layer 3: Open Food Facts (unlimited free)

   Layer 4: TheMealDB (unlimited free)

   Layer 5: Unsplash (50/hr free)

   Layer 6: Emoji gradient (always works)

═══════════════════════════════════════════ */

const CACHE_PREFIX = 'c2c_photo_v2_';

const imgCache = new Map();

const imgQueue = [];

let activeFetches = 0;

const MAX_CONCURRENT = 2;



const rowObserver = new IntersectionObserver(entries => {

    entries.forEach(entry => {

        if (!entry.isIntersecting) return;

        const wrap = entry.target;

        rowObserver.unobserve(wrap);

        const q = wrap.dataset.q;



        // Check localStorage first

        try {

            const saved = localStorage.getItem(CACHE_PREFIX + q);

            if (saved !== null) {

                const url = saved === 'null' ? null : saved;

                imgCache.set(q, url);

                setImage(wrap, url);

                return;

            }

        } catch(e) {}



        if (imgCache.has(q)) { setImage(wrap, imgCache.get(q)); return; }

        showSpinner(wrap, true);

        imgQueue.push({ wrap, q });

        drainQueue();

    });

}, { rootMargin: '300px 0px', threshold: 0.01 });



function drainQueue() {

    while (activeFetches < MAX_CONCURRENT && imgQueue.length > 0) {

        const job = imgQueue.shift();

        activeFetches++; refreshBadge();

        lookupImage(job.q)

            .then(url => {

                imgCache.set(job.q, url);

                // Save to localStorage forever

                try { localStorage.setItem(CACHE_PREFIX + job.q, url || 'null'); } catch(e) {}

                setImage(job.wrap, url);

            })

            .finally(() => { activeFetches--; refreshBadge(); drainQueue(); });

    }

}



function refreshBadge() {

    const n = imgQueue.length + activeFetches;

    const badge = document.getElementById('aiBadge');

    if (n > 0) {

        badge.classList.add('visible');

        document.getElementById('aiBadgeText').textContent = `LOADING ${n} PHOTO${n>1?'S':''}…`;

    } else { badge.classList.remove('visible'); }

}



async function lookupImage(q) {

    const words = q.split(/\s+/).filter(w => w.length > 2);

    const short = words.slice(0, 2).join(' ');

    const core = words[0] || q;



    // Wikipedia: 3 tries — full query, 2-word, single core word

    let url = await fetchWikipedia(q);

    if (url) return url;



    if (short && short !== q) {

        url = await fetchWikipedia(short);

        if (url) return url;

    }



    if (core && core !== short && core !== q) {

        url = await fetchWikipedia(core);

        if (url) return url;

    }



    // Google CSE: saved for hard cases (100/day quota)

    url = await fetchGoogle(q);

    if (url) return url;



    // Unsplash: core word only — avoids vague food scenes

    url = await fetchUnsplash(core + ' food');

    if (url) return url;



    return null;

}



async function fetchGoogle(q) {

    try {

        const r = await fetch(

            `https://www.googleapis.com/customsearch/v1?key=${GOOGLE_KEY}&cx=${GOOGLE_CX}&searchType=image&q=${encodeURIComponent(q + ' food ingredient photo')}&num=3&imgType=photo&imgSize=medium&safe=active`,

            { signal: AbortSignal.timeout(6000) }

        );

        const d = await r.json();

        if (d.items && d.items.length > 0) return d.items[0].link;

    } catch(e) {}

    return null;

}



async function fetchWikipedia(q) {

    try {

        const r = await fetch(

            `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`,

            { headers: { 'Accept': 'application/json' }, signal: AbortSignal.timeout(5000) }

        );

        if (!r.ok) return null;

        const d = await r.json();

        // Reject disambiguation pages

        if (d.type === 'disambiguation') return null;



        // Must be food-related — reject colors, companies, places, people

        const text = ((d.description || '') + ' ' + (d.extract || '')).toLowerCase();

        const FOOD_TERMS = ['food','fruit','vegetable','meat','fish','poultry','seafood',

            'cheese','dairy','herb','spice','ingredient','dish','cuisine','recipe',

            'crop','plant','eaten','edible','cooked','drink','beverage','grain',

            'seed','nut','oil','sauce','soup','bread','pasta','rice','egg',

            'sugar','salt','flour','condiment','flavour','flavor','leaf','root',

            'bean','legume','mushroom','truffle','berry','citrus','pepper'];

        const BAD_TERMS = ['color','colour','company','corporation','brand','person',

            'singer','actor','musician','politician','city','country','software',

            'technology','album','film','television','game'];



        const isFood = FOOD_TERMS.some(t => text.includes(t));

        const isWrong = BAD_TERMS.some(t => text.includes(t));



        if (!isFood || isWrong) return null;



        if (d.thumbnail && d.thumbnail.source) {

            return d.thumbnail.source.replace(/\/\d+px-/, '/400px-');

        }

    } catch(e) {}

    return null;

}





async function fetchUnsplash(q) {

    try {

        const r = await fetch(

            `https://api.unsplash.com/search/photos?query=${encodeURIComponent(q)}&per_page=1&orientation=squarish`,

            { headers: { Authorization: `Client-ID ${UNSPLASH_KEY}` }, signal: AbortSignal.timeout(5000) }

        );

        const d = await r.json();

        if (d.results && d.results.length > 0) return d.results[0].urls.small;

    } catch(e) {}

    return null;

}



function showSpinner(wrap, on) {

    const s = wrap.querySelector('.photo-spinner');

    const dot = wrap.querySelector('.photo-live-dot');

    if (s) s.style.display = on ? 'flex' : 'none';

    if (dot) dot.style.display = on ? 'block' : 'none';

}



function setImage(wrap, url) {

    showSpinner(wrap, false);

    if (!url) return;

    const img = wrap.querySelector('.prod-photo-img');

    if (!img) return;

    img.onload = () => {

        img.classList.add('visible');

        const em = wrap.querySelector('.prod-photo-emoji');

        if (em) em.style.opacity = '0';

    };

    img.onerror = () => {};

    img.src = url;

}



function clearCache() {

    imgCache.clear();

    try {

        Object.keys(localStorage).forEach(k => {

            if (k.startsWith(CACHE_PREFIX)) localStorage.removeItem(k);

        });

    } catch(e) {}

    alert('Photo cache cleared! Reload to fetch fresh photos.');

}



/* ═══════════════════════════════════════════

   LIGHTBOX

═══════════════════════════════════════════ */

function openLightbox(url, label) {

    document.getElementById('lightboxImg').src = url;

    document.getElementById('lightboxLabel').textContent = label;

    document.getElementById('lightbox').classList.add('open');

}

function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });



/* ═══════════════════════════════════════════

   APP CORE

═══════════════════════════════════════════ */

const PAGE_SIZE = 200;

let db = [], filteredDb = [], currentSearch = '', totalLoaded = 0, renderOffset = 0;



function debounce(fn, ms) {

    let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };

}



function toggleMenu() {

    document.getElementById('sideMenu').classList.toggle('active');

    const o = document.getElementById('overlay');

    o.style.display = o.style.display === 'block' ? 'none' : 'block';

}



function toggleTheme() {

    const doc = document.documentElement;

    const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';

    doc.setAttribute('data-theme', next);

    document.getElementById('navToggle').innerText = next==='light'?'☀️':'🌙';

}



function checkAuth() {

    if (document.getElementById('passIn').value === 'C2C2026') {

        document.getElementById('knife').classList.add('knife-slice');

        setTimeout(() => { document.getElementById('loginScreen').style.display='none'; autoLoad(); }, 400);

    } else {

        document.getElementById('err').innerText = 'ACCESS DENIED: INCORRECT CODE';

    }

}



async function autoLoad() {

    try {

        const r = await fetch('data.csv?v=' + Date.now());

        processData(await r.text());

    } catch(e) {}

}



function manualUpload(e) {

    const r = new FileReader();

    r.onload = ev => processData(ev.target.result);

    r.readAsText(e.target.files[0]);

}



function clean(s) { return String(s||'').replace(/[^\x20-\x7E]/g,'').trim(); }



function processData(csv) {

    try {

        const wb = XLSX.read(csv, { type:'string' });

        const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:'' });

        db = raw.map(r => ({

            id:     clean(r['Item']),

            desc:   clean(r['Description']),

            cost:   clean(r['Cost']).toLowerCase().replace(/aed/g,'').trim(),

            um:     clean(r['Base U/M'] || r['U/M']).split(' (')[0],

            pack:   clean(r['Case Packing'] || r['Case Pack']),

            cat:    clean(r['Cat 2']),

            state:  clean(r['State']),

            sup:    clean(r['Preferred Supplier']),

            brand:  clean(r['Brand']),

            origin: clean(r['Origin'] || 'UAE'),

            manu:   clean(r['Manu. Part No.'] || r['Manu. Par'] || ''),

        }));

        totalLoaded = db.length;

        filteredDb = db;

        renderOffset = 0;

        renderPage(true);

        updateCount();

    } catch(e) { console.error('Data error', e); }

}



function updateCount() {

    const el = document.getElementById('resultCount');

    if (!totalLoaded) return;

    el.textContent = currentSearch

        ? `${filteredDb.length} / ${totalLoaded}`

        : `${Math.min(renderOffset, totalLoaded)} / ${totalLoaded}`;

}



function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }



function highlight(text) {

    if (!currentSearch || !text) return String(text||'');

    const terms = currentSearch.split(/\s+/).filter(w=>w.length>0);

    let h = String(text);

    terms.forEach(w => {

        h = h.replace(new RegExp(`(${escapeRe(w)})`, 'gi'), '<mark>$1</mark>');

    });

    return h;

}



function renderPage(reset) {

    const list = document.getElementById('list');

    if (reset) { list.innerHTML = ''; renderOffset = 0; }

    const slice = filteredDb.slice(renderOffset, renderOffset + PAGE_SIZE);

    if (!slice.length) { updateSentinel(); return; }

    const frag = document.createDocumentFragment();

    slice.forEach(r => {

        const tr = document.createElement('tr');

        tr.innerHTML = buildRow(r);

        frag.appendChild(tr);

    });

    list.appendChild(frag);

    renderOffset += slice.length;

    list.querySelectorAll('.prod-photo-wrap[data-q]:not([data-obs])').forEach(el => {

        el.dataset.obs = '1';

        rowObserver.observe(el);

    });

    updateSentinel();

    updateCount();

}



function updateSentinel() {

    const s = document.getElementById('loadMoreSentinel');

    const remaining = filteredDb.length - renderOffset;

    if (remaining > 0) {

        s.textContent = `↓ ${remaining.toLocaleString()} MORE ITEMS`;

        s.style.display = 'flex';

        sentinelObserver.observe(s);

    } else {

        s.style.display = 'none';

        sentinelObserver.unobserve(s);

    }

}



const sentinelObserver = new IntersectionObserver(entries => {

    if (entries[0].isIntersecting) {

        sentinelObserver.unobserve(entries[0].target);

        renderPage(false);

    }

}, { rootMargin: '200px 0px' });



document.getElementById('searchIn').addEventListener('input', debounce(e => {

    currentSearch = e.target.value.toLowerCase().trim();

    const terms = currentSearch.split(/\s+/).filter(Boolean);

    filteredDb = currentSearch

        ? db.filter(r => {

            const t = `${r.id} ${r.desc} ${r.pack} ${r.cat} ${r.state} ${r.sup} ${r.brand} ${r.origin} ${r.manu} ${r.cost}`.toLowerCase();

            return terms.every(w => t.includes(w));

          })

        : db;

    renderPage(true);

    updateCount();

}, 150));



function buildQuery(r) {

    const skipWords = [

        'organic','australian','lebanese','fresh','frozen',

        'chilled','fzn','frz','raw','cooked','boneless',

        'skinless','whole','sliced','diced','minced',

        'cleaned','trimmed','peeled','chopped','grilled',

        'smoked','dried','halal','imported','local','uae',

        'abaca','chef2chef','chef 2 chef','alannahs',

        'kibsons','abela','aiad','uns'

    ];

    let desc = r.desc

        .replace(/\(.*?\)/g, '')

        .replace(/\d+[-–]\d+\s*(?:kg|g|ml|l|pc|pcs)?/gi, '')

        .replace(/\d+\s*(?:kg|g|ml|l|pcs|pc|pkt)\.?/gi, '')

        .toLowerCase();

    skipWords.forEach(w => {

        desc = desc.replace(new RegExp(escapeRe(w), 'gi'), ' ');

    });

    return desc.replace(/\s+/g, ' ').trim()

        .split(' ').filter(w => w.length > 2).slice(0, 4).join(' ');

}



function buildRow(r) {

    const [grad, emoji] = getCatStyle(r.desc, r.cat, r.brand);

    const q = buildQuery(r).replace(/"/g,'&quot;');

    const descSafe = r.desc.replace(/"/g,'&quot;');

    return `

      <td style="color:#64748b;font-family:monospace;font-weight:700;font-size:11px">${highlight(r.id)}</td>

      <td>

        <div class="desc-cell-inner">

          <div class="prod-photo-wrap" data-q="${q}" data-desc="${descSafe}" onclick="handlePhotoClick(event,this)">

            <div class="prod-photo-bg" style="background:${grad}"></div>

            <div class="prod-photo-emoji">${emoji}</div>

            <img class="prod-photo-img" src="" alt="${descSafe}">

            <div class="photo-spinner">

              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">

                <circle cx="10" cy="10" r="8" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

                <path d="M10 2a8 8 0 0 1 8 8" stroke="var(--brand)" stroke-width="2" stroke-linecap="round"/>

              </svg>

            </div>

            <div class="photo-live-dot"></div>

          </div>

          <div class="desc-text-wrap">

            <div class="desc-name">${highlight(r.desc)}</div>

            <div class="desc-pills">

              ${r.cat ? `<span class="cat-pill">${highlight(r.cat)}</span>` : ''}

              ${r.state ? `<span class="state-pill">${highlight(r.state)}</span>` : ''}

            </div>

          </div>

        </div>

      </td>

      <td style="color:var(--brand);font-weight:800;font-size:15px">${highlight(r.cost)}</td>

      <td style="font-weight:700">${highlight(r.um)}</td>

      <td><span class="pack-value">${highlight(r.pack)}</span></td>

      <td>${r.brand ? `<span class="brand-pill">${highlight(r.brand)}</span>` : ''}</td>

      <td class="sup-cell">${highlight(r.sup)}</td>

      <td class="manu-cell">${highlight(r.manu)}</td>`;

}



function handlePhotoClick(e, wrap) {

    e.stopPropagation();

    const img = wrap.querySelector('.prod-photo-img');

    if (img && img.classList.contains('visible')) openLightbox(img.src, wrap.dataset.desc||'');

}



function handleQuickCopy(e) {

    if (e.target.closest('.prod-photo-wrap')) return;

    const cell = e.target.closest('td');

    if (!cell) return;

    navigator.clipboard.writeText(cell.innerText).then(() => {

        const t = document.getElementById('toast');

        t.style.display = 'block';

        if (navigator.vibrate) navigator.vibrate(50);

        setTimeout(() => t.style.display='none', 600);

    });

}

</script>
