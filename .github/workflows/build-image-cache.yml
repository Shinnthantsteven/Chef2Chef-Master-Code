 name: Build Image Cache

  on:
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest
      timeout-minutes: 340

      permissions:
        contents: write

      steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install dependencies
          run: pip install requests

        - name: Run image cache builder
          run: python build_image_cache.py

        - name: Commit images.json
          run: |
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add images.json
            git diff --cached --quiet || git commit -m "Update images.json [$(date +'%Y-%m-%d')]"
            git push
